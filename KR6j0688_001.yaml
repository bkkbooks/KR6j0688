body:
  text: 明會稽顯聖寺後學沙門湛然圓澄注客有問楞嚴經題者曰有以空假中釋一大字有以體相用釋大佛頂二者以何為是答曰體相用總釋一大字耳蓋體大相大用大體即空義以真體無形求其狀貌不可得故相即假義從體顯現儼然可即故用即中道義合前體相而成妙用故體空無盡求其邊表不能得故稱體大妙相難思諦觀不能見頂故稱相大用莫能測魔外莫窺分齊故稱用大三者共名大者以功齊故也三不自三而常一一不自一而常三舉一即三言三合一三一縱橫咸得言大故曰有一無二故不中不中故不圓有二無一故不中不中故不圓由是而知牽連自在縱橫無礙無礙故名圓圓故名大佛即是人頂即是喻謂如是三法佛所崇仰喻之如頂若以三字配之義不相貫恐非佛意故不之取而復應知此之三法皆自心之影像若見自心則三一皆同幻妄也曰如是三法諸佛所證喻之如頂前所論明何以斥為幻妄前後顛錯實所不喻曰汝知之乎二乘修空凡夫修假大乘修中皆名道心不曰然如阿難見相發心從佛剃落其所發之心寧非道心耶曰實為道心如此則何以世尊斥云一切衆生不知常住真心用諸妄想此想不真故有輪轉所言用諸妄想豈非指彼所發之道心耶曰然如來即彼因見發起的道心內外中間七處徵斥了不可得見既如是聞聽覺知亦復如是二乘修空出假既已被斥空例假中未有不然徵逐既不可得豈不同於幻妄所以諸佛證此不可得故妙用縱橫學人妄認有得而終身莫契故圓覺經云認一切我為涅槃故有證有悟名成就故譬如有人認賊為子其家財寶終不成就故知惟三與一皆自心影像若證自心則了不可得同於幻妄曰若然者佛何以不直指自心廣説如是名相使後人迷悶莫入豈佛心耶蓋為佛不對佛説對凡夫説若對佛時則口挂壁上凡夫在迷欲使其悟所以開示冀彼悟入也譬如傍人指彼人云面有油墨目有翳眚以及龍顏鳳準虎頭燕頷乃至若貴若賤非對自説亦非虗妄何以故彼人如言領受則未有不是若欲反目求見則終身莫能覩向外尋覓則窮劫莫能得佛之説法亦復如是冥心密契可也如或形於動念早自差了何況更要向名相中覓箇安心我恐終身莫得故云幻妄耳曰三德三大義實圓足而復斥同幻妄於理頗似事恐不然何也佛稱密因經目了義而菩薩名為萬行豈不指此三法而別有他哉若言即是何云修證夫修證者豈證幻妄耶答曰正指三法諸佛證其不可得而得故妙用自在凡夫不知故輪回無始三乘各執一偏不成增進是三者優劣可以比而知之矣蓋緣一切諸法不出此三而三法本自心之影像若證自心則名色俱消如前油墨之喻可證不可得可知不可見不有而有非無而無故法華曰我所得智慧微妙最第一所以凡夫背善向惡深為輪轉根本三乘厭惡欣善復是偏見之源若説貪瞋癡是則凡夫成於撥無若説貪瞋癡不是則三乘專就偏見故於難思之法密而闡之何為密闡如阿難誤墮淫室歸來佛所啓請妙奢摩他三摩禪那而繼曰最初方便阿難明知三法依乎一心一心若悟則三法自顯豈不云似悟而迷也而世尊亦所謂勾賊破家看孔著楔且不徵其墮淫之謬亦不與説妙奢摩他但問最初發心蓋二乘人不了自心妄生欣厭以墮淫為過發心是德過德雖二無性是同一境無差欣厭成病世尊將彼自視之道心徵之七番方知無有若汝道心既無處所墮淫之心又安在哉利根上智即可知歸如淨名云心不在內亦不在外不在中間如其心然罪性亦然二比丘豁然大悟阿難雖不即領亦識自心憫及將來復興後問如是開示豈不謂之密闡嘉猷諸佛修證比丘當學諸經詮此為了義菩薩修之為萬行夫森羅萬象至空為極百川衆流至海為極一切萬法至心為極心也者總持之大本衆義之妙門此經直示常住真心若悟此心則一切事究竟堅固名義如是子復何疑如是我聞至文殊師利而為上首一時之語結集者自言如是之法我從佛聞蓋不敢自言有法也復指時處憑據可準非謂荒唐茲者去古遠矣説法者曾不祝香談禪者不言師承憑據既無慧命斯絶出佛身血無甚於此若必曰不假師承則迦葉何待彌勒達摩何用西來太陽何憂絶嗣風穴何須痛哭下文云譬如庶民妄稱國王自取誅戮後來者可為良鑑矣休夏自恣者佛制比丘四月十五為禁足之晨七月十五名為解制蓋緣盛夏道路往還誤傷蟲蟻慈悲有缺故稱護足然則一夏所得向佛咨決或有過失亦以自陳羅漢而曰初心者蓋謂羅漢已具神足尚須禁護何況初心今之沙門不思佛制間踏州縣探玩山水毋論冬夏以為能事智者孰不痛焉菩薩咨決心疑者下地上惑勢不能齊大士尚決心疑何況初心後學今之時輩一出家來便學自在知識不見一人道理不聞一句縱到知識面前曾不自吐工夫冀彼許箇如是少加徵詰便覺觸心畢身不欲再面較彼菩薩又何如耶時波斯匿王為其父王諱日營齋至嚴整威儀肅供齋法國王延佛言必赴也長者居士同時飯僧明分領也阿難先受別請不與僧次也途中獨歸明其無供也國王長者同時飯僧以知各有所應惟屠兒魁膾淫坊酒肆既無道心未有所請故冀彼為最後檀越所以誤墮也問曰緡蠻黃鳥尚知所止豈有聖賢而不知所擇誤墮淫室耶非不知也蓋欲圓成衆生無量功德故行平等慈也又聞如來訶迦葉等心不均平度諸疑謗故次第耳爾時阿難因乞食次至及摩登伽歸來佛所攝入淫席淫躬撫摩明其逼之至也將呪往護大教之所興也齋畢旋歸必説大法所以王臣俱隨也所言幻術者有淫呪有淫藥有淫勢樓炭經以炭為樓令其猛熾如不就淫逼令赴火更兼邪呪所禁身不自由幸無淫藥心未狂亂故曰將毀而已阿難見佛頂禮悲泣至退坐默然承受聖旨淫呪所加則知道力不全道力不全則知多聞無功啓請妙奢摩他三摩禪那冀道力全也佛告阿難汝我同氣至此想不真故有輪轉先敘天倫者人情也次徵發心者辨妄也阿難會意從實所供自謂欲氣粗濁不能發生勝淨妙明不能發生故逢欲則深生怖畏世尊盡令惟欣與厭總名妄想無始生死病源於此迷此流轉七處咸然苟悟一心成佛叵得阿難憫及未來騰請世尊微細發明始知欣厭都如夢幻汝今欲研無上菩提至故我發心願捨生死先核直心令離諂詐也蓋道貴真實諂詐之為害也深矣次詰見愛乃勾賊破家也阿難名之心目者乃認賊為子也惟欣與厭同是妄心妄計所成若離妄計欣厭何生三乘不了妄生取捨病源既同不可不辨阿難秪作狀頭耳佛告阿難如汝所説至是兵要當知賊所在欲明真心須窮妄惑妄惑若明真心自了故曰不知心目所在不能降伏塵勞國王者合前常住真心也賊者合前用諸妄想也發兵者合今徵心辨見也妄盡覺圓心通法遍法爾如然非為強作世尊法喻合明宜乎不言而喻阿難既不深明不容無後問耳使汝流轉心目為咎至如是識心實居身內秪知流轉心目為咎且不知全體屬妄何也若此緣心真實是有應有所在既有所在非無指示既有指示即今何在十種異生識心在內冀無異詞也青蓮華眼秪在佛面者冀無異處也佛及衆生既無異處何獨我之心目在別處耶佛告阿難汝今現坐如來講堂至故我在堂得遠瞻見欲示無處之心先定內外之見世尊指堂為問欲破在內之心阿難隨問而答未諳問之所以前云由目觀見心生愛樂乃自外而內者也今云在堂戶牖開豁得遠瞻見乃自內而外者也二語相違處孰為定爾時世尊在大衆中舒金色臂至住在身內無有是處將破妄心而先摩頂安慰者慈悲之至也蓋恐小乘人乍聞大法心生畏怯故也既安慰已理前所述汝心若在身中應如汝在堂中先見內堂後見外物次第如是何以汝今不見身內心肝內藏縱不能見筋脈外浮亦合明了故以在堂不見如來而見堂外譏之阿難自欵不然又是一重差過也問曰假如琉璃光菩薩能內見五藏心可在內不答曰彼能內見身中者謂復觸塵無礙眼根反觀而能見之耶謂復內證了了不由前塵而能見之耶若眼根反觀心眼還同在外若不由前塵則肝藏應非所對非對則誰知其為肝藏耶況且見及見緣正中如來所斥烏得稱為在內心猶根本目猶枝葉根本若除枝葉自枯故前則心目雙呈今則但徵心之所在耳阿難稽首而白佛言我聞如來如是法音至住在身外無有是處在內之心既已被破便為心在身外引燈在室外冀同了義世尊即彼燈喻用斥其非汝心若同燈在室外者即汝一人見燈之時衆人同見是燈若實如是一人食時衆人飽不阿難自述不然阿羅漢身執已忘尚且軀命不同何況凡夫各封身執而能一人衆飽世尊意曰既云軀命不同則汝身秪可自知豈有身外之心能知汝身耶若許亦知則同他心量若同他心者則身心相異異則心知身不能覺身覺心不能知若言各有知者則同兩人若言各無知者則同草木今則不然我今示汝兜羅綿手汝心若同燈在室外者豈不同我手在汝之身外耶汝試揣之此了知心謂復在我手邊耶為復在汝身際耶若在我手還同他心何預于汝阿難無預則汝身汝心俱無處所若在身際云何而言在外阿難白佛言世尊如佛所言不見內故至如琉璃合無有是處阿難內外之心既已被破復計潛根如琉璃合若實潛根同琉璃者耳鼻舌身豈特不然即如眼之所見同於琉璃耳之所聞鼻之所嗅舌之所嘗身之所觸彼各有知同何物合彼無可喻此亦不然豈有五根之中獨許眼見為心彼皆非心者哉阿難實原衆生自分以為請端世尊即此為破者亦是將錯就錯何也且衆生於日用之中可以自驗矣耳之聞聲剎那不住聞性寂然舌之嘗味鼻之嗅香身之覺觸合則有知離則無覺惟此知見昭昭然常在眼前其執偏重所以父子盤桓惟斥見根此見若破聞聽覺知自然不破而破矣故世尊不以餘根例破秪以琉璃籠眼斥其法喻不齊耳何也眼潛琉璃則見山河時實見琉璃心潛眼根則見山河時何曾見眼若見眼者眼即同境同境則不應有見無見則不得言隨若言隨者應是心眼兩皆有見若必有兩眼同琉璃合者琉璃亦合有見是義不然事理俱違難齊法喻阿難白佛言世尊我今又作如是思惟至汝言見暗名見內者無有是處內外破斥潛根亦非但不知無性之心復立內外之見阿難意謂臟腑在中竅穴居外似有一物於中往還世尊便詰暗境為對不對對即暗在眼前何曾在內不對即凝然暗室皆汝焦腑是義不然阿難自解非謂對眼之暗乃反觀之暗也既以反觀成內何獨不以反觀見面若能見面則此心在於虗空在空則何預於汝若空能見即汝心眼者即應如來今見汝面亦汝心目若實是者能見面故心眼已知身合非覺如此則同前燈在室外之喻也若汝執言心亦有知身亦有覺如此則惟問與答應無兩人即汝一人應成兩佛經云即應如來今見汝面亦是汝身此句不穩何也若如其言即云汝身已知心合非覺是義不貫應云如來今見汝面亦汝心眼汝眼已知身合非覺於義頗便阿難言我常聞佛開示四衆至隨所合處心則隨有無有是處心生故法生者法無自體法生故心生者心無自體既云生故生則隨所合處心則隨有亦云滅故滅則隨所離處心則隨無也況乎思惟之心隨緣則生滅宛然緣散則俱不可得即思惟不可得者那得有處故世尊以體之有無為難心之與法惟有其名本無自體無體而能合則十九界與七塵合矣何也以界惟十八塵只有六若以十九界與七塵合徒有其名而實無體無體故不能合也若必有體則汝試揣其內外內出則還見身中外入則先合見面阿難復解云我言心隨有者心只有知非謂有見何也見是其眼心知非眼為見非義世尊難云若眼能見秪如汝在室中先云戶牖開豁得遠瞻見豈是門能見耶死者眼存既不能見則見性何嘗屬眼問曰死人之眼不能見者同彼室中之人前云心在身中世尊何以不許答曰人與室逈然可別心與眼將何以分豈不見下文云一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明心中所現之物又曰空生大覺中如海一漚發有漏微塵國皆依空所生故以一體多體遍及不遍微細推驗皆無處所則知從前妄認內外等見可以消矣阿難白佛言世尊我亦聞佛與文殊等至當在中間無有是處此中引佛與文殊説法證前非內外也但不知中亦惟名而無有實故引方為證耳阿難自釋非身非表乃在根塵之間殊不知根即同身塵即同處故世尊以兼與不兼為破兼則一半有知一半無知知即屬根不知屬塵中在何處不兼則非根非塵二既不有中在何所又兼二則三相宛然不兼則一亦叵得下文十二處廣明此意長水改外不相知作外又相知此大不然何也且相知與下身心相知義似合掌不成破意豫謂內有所見外不相知內無知故在內不成身心相知在外非義無知破上有見相知破不相知文義顯然云何却改不字故以逐句合成內有所見以無知故在內不成外不相知身心相知在外非義管見如此智者正之注中以根塵無知心體有知此大不然經中明言眼有分別色塵無知識生其中則為心在而世尊亦曰汝心若在根塵之中為復兼二為不兼二所言兼二者豈不兼根塵耶那得根塵同目無知眼有分別色塵無知豈不曰知自屬根不知屬塵兼二則一半同根一半同塵故曰成敵兩立不兼則非根非塵即無性體阿難白佛言世尊我昔見佛與大目連至一切無著名覺知心無有是處先是十二類生同將識心居在身內至隨所合處心則隨有者原凡夫所見而為問也既為所破復引佛與文殊等談實相時既非內外應在中間不意亦為所破此中復引與聲聞説既非內外中間復立一切無著正是聲聞所墮上云隨所合處心隨有者認物迷體不知體之本無此中一切無著者執體迷用而不知用之原有各就一偏故為所破耳而世尊之意秪欲使知妄心無所不欲令其迷乎體用故指目前一切物象為問若彼一切冥然無分同於無情無所分別誰明無著若彼一切舉目了了分別宛然何明無著下文所謂但有言説俱無實義斯之謂矣爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟至傾渴翹佇欽聞示誨阿難先因墮淫慌怖自恨道力不全歸來佛所特請妙奢摩他三摩禪那最初方便而世尊特誨不知常住真心用諸妄想故有欣怖真心若悟欣怖皆除此即禪那等初方便也由是七番徵破始知前來所學所認皆是妄心雖以多聞不得無漏被物所轉迷真逐妄之謬也奢摩他而言路者詣真際之路也下文明了其家所歸道路彼即稱述此中開示之功此路若明非惟我等被益亦使闡提隳諸惡見耳爾時世尊從其面門放種種光至合掌承聽面門放光而言種種者眼色耳聲功能不同故也凡夫六根各封其執照不明了號曰無明諸佛六根同時互放照無不窮故如千百日也將顯本明必破無明故六種震動也無明既破如盲獲覩故國土一時開現也根塵互融彼此莫隔同一真心故云合成一界所言佛之威神者乃自心妙悟之象也菩薩各住本國者六根雖曰互融而實本際不動也欲發本明先現瑞光以曉初心智者了達因象而詣實際矣何為象示也凡我之輩因佛光而達心光由事相而知理相如此則諸佛六根之光皆我本有何也即如眼之放光山河大地草芥人畜森羅萬象明暗色空舉目了然微細涉入纖悉洞鑒隱顯俱該日光雖明不能照於幽室心光微妙明暗無不了然故云千日不足喻其明也一根如是六根亦然日用具足念念無差佛及衆生孰不如是但吾輩不能直下承當故勞聖賢互興問答作法門之標幟耳由是而推猶借衆生局量若據本分現量何數量之可測哉佛告阿難一切衆生從無始來至枉入諸趣前文自阿難而普及大衆此中自一切衆生而誨示阿難蓋彼此互顯也何也衆生在迷諸佛居悟阿難位當初果正居迷悟之間發迹窮源無出於此所以如來對告也文分三節衆生全迷故業種自然如惡叉聚諸佛全悟故一道坦然於法自在諸修行人居其兩間皆由不知二種根本雖云二種總是一心何謂也所言生死根本即是涅槃淨體故圓覺經云一切衆生種種幻化皆生如來圓覺淨心是知無別有體也夫生死根本涅槃淨體而中曰無始菩提涅槃菩提曰覺但覺與不覺似成二耳所以諸佛悟此即生死即是涅槃故全體發揮皆名大用衆生迷此即涅槃即是生死故凡所舉心塵勞先起所以示誨阿難令諸修行人知所擇焉何謂涅槃體中所生之緣也所言生死與涅槃對煩惱與菩提對聖與凡對是與非對欣與厭對得與失對邪與正對空與有對人與我對凡是所對之法皆是自體所生之緣也是緣無體剎那不住故曰當處出生隨處滅盡不了無住之緣妄生取捨所以阿難見勝相而生欣愛墮淫室而生恐怖若知是緣念念不相到則摩登伽在夢誰能留汝身遺此本明枉入諸趣良可悲夫阿難汝今欲知奢摩他路至此非我心當名何等前文若眼能見汝在室中門能見不明知見不屬眼何以却云汝目可見以何為心何故世尊之語自相顛亂若是耶蓋前則引見歸心所以斥眼非見此則顯心非見所以權指眼見耳上來七番徵逐真妄顯然知彼疑心未盡所以舉拳重驗也阿難秪知推窮尋逐為心而不知欣厭取捨皆心謬計故世尊總斥為非大似寶劒當頭一揮任是德山臨濟齊立下風阿難假示驚愕如智將埋兵調鬬欲使蠢動含靈咸知本體我等不能直下承當反譏阿難不解者真自欺也唐時祿山作亂有一老軍從陳逃回聞路傍空舍有哇哇聲往視之其孩提指梁上布囊軍即取與視之孩提見灰飯想既消愕然脫去蓋母不忍捨以灰權囑為飯耳大抵衆生日用全體不會全體具足所以妄心一死脫然化去圓覺經曰一切衆生皆證圓覺我信之矣阿難實非不解直欲盡性窮源使大教流行所以起此無心之怖耳佛告阿難此是前塵虗妄想相至故受輪轉上云奢摩他路奢摩他云靜慮夫靜慮者當以無心契合故世尊一咄總斥非心若達無心乃為涅槃淨體之路也阿難執認推求不知正是生死根本既為世尊奪破矍然復問當名何等於此明告乃是虗妄前塵如何喚作本心流轉生死皆由認賊為子阿難白佛言世尊我佛寵弟至開示未悟阿難先因墮淫生怖歸投佛所自知道力不全啓請妙奢摩他最初方便而世尊不詰墮淫之謬且徵所發道心由是數番徵斥至此雖知錯認猶是似悟而迷於是重述二心供養諸佛道心也謗法毀戒邪心也道心既為所奪頗知邪心亦復非有然此二非心則我無心同於草木非惟我生驚怖而大衆亦皆生疑故冀開示耳蓋三乘人捨惡從善不知善是惡因離邪求正豈識正為邪本取捨既存於心分別自形於念念存則生死宛然心空則涅槃平等阿難為衆竭力領罪自歸細究端倪一一皆原大衆爾時世尊開示阿難至其誰修證無生法忍上云涅槃淨體能生諸緣阿難仍復執認緣心以為自體既為所奪便乃疑同草木世尊告曰諸法所生惟是涅槃心現世界微塵莫不因此汝何執認緣心擬同斷滅因執緣心是實所以三乘歷劫不能成彼聖道凡夫迷此無始業果自然若悟緣生無性便解稱體發揮大用現前可名於法自在阿難未悟惶怖重生世尊殷勤再勸秪此緣心要因緣有縱滅見聞幽間內守猶是法塵我非故意斥汝所執非心汝可於心自揣離塵有性可是真心緣滅無體則心同斷滅心同斷滅則無生法忍必無修證之日矣阿難向執緣心誤為真實不能遠離摩登伽難故請妙奢摩他而如來處處徵逐使知緣心不有阿難便認為無心世尊展轉開示此心離緣無體似或可信若云內守幽間猶是法塵是必難信故曰離此覺知更無所有即時阿難與諸大衆默然自失自失而曰默然者向執緣心以為自己而世尊令其微細揣摩頗知緣心不實所以自失然則此心有體不應滅無體不應現即我則不待緣非我則不應知若一向離我獨立則同樁守一向隨緣任運則同顛倒如是兩難相許所以默然佛告阿難世間一切諸修學人至不成聖果首則創言蓋由不知常住真心用諸妄想此想不真受諸流轉可謂徑且直矣恐阿難不能即信故重重破斥至此默然自失頗不自疑故明以告之非汝誤認不能折伏邪呪諸修行人不成聖道莫不由此阿難聞已重復悲淚至發妙明心開我道眼悲淚而言重復者一者不能免離摩登伽難將謂道力不全而不知求道之心正是生死之本二者將謂如來惠我三昧而不知身心本不相代所以重重悲淚也捨父逃逝者喻背真向妄也説食不飽者喻錯解惠我三昧也二障所纏不知寂常心性者以法顯喻背父義也發妙明心開我道眼欲補説食之謬也所言二障者一者事障續諸生死即是背覺逐緣之謬也二者理障礙正知見執其聞見不即修行即是多聞無功之謬也此重顯悲淚意也由不知寂常心性故請發妙明心也前之默然自失處有二難若獨立樁守則不成增進若任運隨緣則未離生死二者各處一偏常為如來所斥若隨緣不變不變隨緣始獲妙明未獲融通者由道眼之不開也道眼若開則自然照不失寂較彼多聞逈然異矣即時如來從胸卍字至旋至阿難及諸大衆心光一種而有百千色妙明密映也周遍十方者一念圓含十界也遍灌佛頂者佛佛道同也旋至阿難大衆者在會之衆將證此心也告阿難言我今為汝建大法幢至得清淨眼上來誤執眼見心知是名顛倒由是迤𨓦徵逐既知攀緣之念非心則知見色之性非眼根身既非豈不謂推顛倒之大幢也性淨明心者酬前發妙明心也清淨眼者酬前開道眼也下文盲人矚暗者使悟見性非眼是開道眼也屈指飛光者使悟性非搖動獲淨明心也阿難汝先答我見光明拳至如是見性是心非眼世尊以拳類見之問故問也阿難相類之答實答也何以故問蓋由阿難攀緣之心知非身執之見未滅自謂身滅則無心可得故請寂常心性而世尊欲顯其常先問其斷無手無拳事則如是無眼無見理必不然有眼無眼是自形殘見暗見明性何虧損自遠而近自疏而親自燈而顯眼見自眼而顯心知其微妙開示可謂正直矣問曰前云若眼能見汝在室中門能見不則諸已死尚有眼存云何不見如此則阿難已知見不在眼何故如來重復開示答曰前由阿難云見是其眼心知非眼故已破之雖則已破妄心未除妄見真見還同妄見此則阿難雖悟緣心之不實無心之疑猶存故請寂常心性世尊指常性即身以示也盲人矚暗見性無虧無虧之性即寂常心也問曰前云縱離見聞覺知內守幽間猶是法塵影事與此盲人之見何以異也答曰前為學人雖則離緣猶存能所所以斥之此中盲人全不知有能所俱無非彼所類矣苟知見性非眼則六根四大當念消融下文云歷僧祇獲法身未必不原於此如能悟入亦所謂一根返源六根解脫常性已顯色執難消鈍根莫入所以學者徒知耳根為上而安知二十五無學所證圓通實無優劣是佛所言阿難雖復得聞是言至名為塵義佛言如是口已默然者不知所措也雖悟見性無虧而不知離塵即塵之義所以默然耳何也若此見性即塵則同前隨緣分別之心若必離塵如彼盲人矚暗而尋常見色之時當名何等故冀開示而世尊明告名為客塵剎那不住汝之見性同於主人曾無去來一切衆生不成聖果因其所誤由是招告鹿苑開悟之徒自欵所由而陳那設譬發明客塵義顯應即除疑然則住與不住似同二物下文屈指飛光使悟無住即住動即不動也客塵者見惑處粗名客思惑處細名塵粗細雖異不住是同能惑真性同名煩惱今以五科解釋一約所顯成實云經言客塵者以顯心性是常故二約所修圓覺云修奢摩他者覺識煩動靜慧發生身心客塵從此永滅三約所證佛地云為斷客塵證淨法界四約所離佛地云圓鏡智者正淨無垢離客塵故五約所染勝曼云如虗空淨心常明淨無轉變相虗妄分別客塵煩惱所染此經不住名客住名主人澄霽名空搖動名塵即緣塵分別為客塵義即時如來於大衆中屈五輪指至尚無有止誰為搖動佛言如是陳那解明客塵二義自是小乘所見動與靜別主與客異斷煩惱而證菩提離生死而入涅槃有得未忘不成增進所以寄阿難而發明實進破聲聞也故世尊屈指示誨而阿難即悟見性原非動靜即塵而非塵飛光左右即知搖動本非搖動去來曾不去來雙呈兩拂有得俱忘寧不為陳那等更進一步也初則以手為問使知外境不實次則以頭為問使知根身不有如是而知為妙明心如是而見為清淨眼矣於是如來普告大衆至輪回是中自取流轉問曰頭自搖動見無所動手自開合見無舒卷正釋客塵之義何以復責大衆其旨安在哉豫上曰寄斥聲聞者此也陳那之意客去主存塵寂空在雖離前塵猶住見覺不知常住之見正是法塵阿難善解佛意乃云佛手不住而我見性尚無有靜誰為無住次云我頭自動而我見性尚無有止誰為搖動動靜雙拂去住兩驅客去主忘塵忘空滅深愜佛意所以指阿難而責大衆也若不如此阿含何稱小教此會何稱圓宗是知此經逈出三乘學者當熟思之阿難自述二障所纏良由不知寂常心性故啓如來發妙明心開我道眼而世尊則以拳例見使知見性是常次引盲人矚暗使知性不屬身常心道眼於此可見矣再明告不成聖道過由客塵辨明二障事障在粗故同客義理障微細故同塵義緣塵易曉故屈指以辨非住不住身執難忘故即頭以驗動與不動自遠而近自細而粗委曲發明可謂慈悲之至矣爾時阿難及諸大衆聞佛示誨至二發明性阿難因世尊徵心辨見以及盲人矚暗自知見性無虧屈指飛光頗信見性不動即境心觀則手自開合而見無舒卷即身以觀則我頭自動而見無搖動如此開示故得身心泰然始知從前妄認之失所以自悔而復自慶也然所謂常住真心者不知即身即是不知離身別有若即身者身當敗壞終從變滅滅則不可言常住也若離身別有何異前云心在虗空同他心量如此則何以知是身中是偽是真是生是滅是不生滅耶蓋因阿難屢屢呈疑如來即事徵驗事疑少除不能忘言契旨理執猶存前則似解不解所以兩次默然今則欲信難信所以發言申請而如來知機識變亦不與當頭説破默令波斯匿王傍開隻眼耳時波斯匿王起立白佛我昔未承諸佛誨敕至踊躍歡喜得未曾有匿王座起為問身中真偽生滅與不生滅也而世尊即身以驗逐一徵告最後乃云皺者受變不皺非變變者受滅所謂變是色身是為虗偽彼不變者元無生滅所謂見性非皺是為真實如此則色身念念遷移而見性曾無剎那可滅豈非即生滅中示不生滅耶阿難前答手自開合見無舒卷所謂境幻而心真者也我頭自動見無所動所謂身假而性實者也似乎已解何以復問身心真偽生滅耶蓋由前塵易曉身執難忘冀欲於生滅身中示不生滅性阿難初問身心二途何以世尊令觀四念處耶由阿難出塵真諦當機無修無證故凡所推窮尋逐總斥非心匿王在纏俗諦當機即證即修故必假問答研詳始見真性既假問答何廢修證故示四念處令其推觀所以初問汝之肉身即示身念處二問汝未曾滅即示心念處念念遷謝緣心之體新新不住無常之性也三問汝之生齡應不頓朽示受念處孩孺則膚潤澤衰耄則形色枯朽自受處無常也四問汝之形容應不頓朽示法念處年月日時密密遷移我誠不覺定是無常故世尊許其徒知無常而不知真常故引觀河之見令悟不遷若能默證了然何必更云見見非見若執定有見性可得則還同認賊為子阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅至認悟中迷一切佛法不出二諦所謂世俗諦第一義諦也世尊垂手為問者使知遺失所由也阿難據世人為問者簡自非倒也而世尊告曰佛及衆生法身平等本是一體但所見成差非性有別垂手順體為倒豎臂逆指為正於世諦中尚且見不明了顛倒如此何況第一義耶汝引諸世間人為答者汝見必非其類也若執定有身境可得汝身佛身顛倒名字在於何處由是阿難大衆瞢然失所而如來普告色心諸緣及心所使諸所緣法唯心所現心存妄計名字由生一念忘緣顛倒不實汝先答我手自開合見無舒卷我頭自動見無搖動如此則見性異於身境云何仍認色身緣彼前塵作正倒見豈不為悟而復迷耶夫如來垂臂須鑒在言前自知顛倒若少加分別非惟以正為倒以倒為正非也即以正為正以倒為倒何嘗名悟所以世尊拈華迦葉破顏便云吾有正法眼藏用付迦葉噫阿難當時若解微笑必也世尊口挂壁上矣晦昧為空至如來説為可憐愍者上云色心諸緣唯心所現云何所現世尊明告妙性本明良由不覺迷為頑空頑空與無明和合結暗為色有器世間礙色與頑空二法和合不動而動故有色身根身既具識念自萌識念既萌不有而有攀緣心生故趣外奔逸用此攀緣為心則決定惑為色身之內而安知色身外洎山河大地咸是妙明心中所現物耶夫身心不有妄執為實是謂一迷其猶背海認漚者也於幻有身心中重起取捨墮淫生怖見相生愛目為真心重是一迷其猶認漚為海豈不為之倍迷於垂手頃二迷兼具故曰等無差別此文深奧當細探其實自審相應可也不爾則徒誇玄妙何異説食不飽何也圓覺經曰云何無明妄認四大為自身相六塵緣影為自心相譬彼病目見空中華及第二月又云彼無明者非實有體如夢中人夢時非無及至於醒了不可得二文當合看此為小乘者説唯心所現次第生起因緣彼為菩薩直説妄認而已此中唯心所現則剎那不住曾無處所不知無處故下文多方辨見彼即直告如夢所見醒不可得云何不可得如夢所見山河大地草芥人畜與覺無異至於醒時非惟夢中之境不可得而身亦不可得非惟身不可得而心亦不可得非斷之使無非遣之使無非修之使無是畢竟無以夢例覺覺豈不然夢本不有覺則知無覺如是實夢應知有夢不知有覺處元虗覺夢兩非真心斯在然則我輩於日用中能如夢之獲覺不真得如是現前身心山河大地畢竟是箇什麼如不相應休教容易虗度光陰勉之勉之阿難承佛悲救深誨至拘舍離等昧為冥諦阿難因聞晦昧生起因緣頗悟身心皆為幻現真心常住然猶存於能所故不能無疑何也此心若是前云因聲而有分別塵滅則此心同於斷滅那得名為常住此心若不是者則現以緣心允所瞻仰因此二疑故未敢認為本元心地世尊意曰若以所緣音塵以為心者我所説法在指汝心若離汝心則説無可説汝能因説悟心心悟則自忘其説若執我説以為汝心豈不同彼執指為月者乎彼人指月令其識月若執指為月非惟不識月亦且不識指月明指暗二物皎然何得明暗不分自他混濫豈為智者若以能緣之心以為心者此心要在待緣緣盡則滅剎那幻寄同於旅客只如即今我已説盡汝之緣心又安在哉非惟音聲無性剎那不住汝認為心者非也昭昭在目復名何等若亦名心則此心要因分別而有若離分別則外境何狀故下文云汝今諦觀法法何狀法法何狀則色即非色遇緣斯應則空即非空非色非空所以昧為冥諦夫冥諦者杳冥恍惚真為戲論世尊直言常住真心者苟非洞悟安得了然所以阿難微細問明欲使後來無惑耳離諸法緣無分別性至是故如來名可憐愍若以緣塵聽法之心以為自心此心應離前緣有分別性若離緣無有則汝心性應有所還聞法之心還於聲塵聲滅則無見相之心還於色塵色變非有以是二者例一切法莫不如是可還之心剎那幻寄同於旅客誰是其主幻寄之心喚作本元心地何其謬也阿難復問若我聽法心性有可還者而如來所説亦可還不世尊告言亦是可還當還於機無機則我常默然如此則惟説與聽各有可還妙明元心云何無還世尊告言且汝見我之見本是可還汝之見精明元若存能所妄計所生喻第二月揑目所成非是月影雖存能所猶不可還能所若忘真為妙覺明性當欲誰還由是標示八種諸變化相一一各還本所而八種之見隨相已滅若不滅者則誰知前後差別耶汝見八種見精當還何所若還於明暗則隨滅誰當識暗如此則彼相自相生滅而見精何常為之去來以無去來故彼諸可還之相自然非汝不汝還者非汝而誰故知汝身清淨常住因存能所故成迷悶吳興云亦有所還還無明故此解太迂破色論曰一切衆生日用所見牛作牛想馬作馬想諸佛所見亦復如是於彼衆生有何差別答曰一切諸法有二種想所謂世流布想著想諸佛有世流布想而無著想如此則聖賢何嘗無見明與無明曾無二性著與不著豈是兩人若言定有無明不破我恐終其身而莫能見道矣若能心不緣塵自然念念寂滅世尊乃云當欲誰還而曰當還無明豈不太迂乎阿難言我雖識此見性無還至性汝不真取我求實阿難謂若此見精即是妙明元心云何如來洞見微塵剎土我等秪見初禪衆生不過分寸若即是者不應有優劣若不是者那得無還兩處失準故不敢認為真性而世尊還以優劣見原相告者遠近在位見性無差譬如有人居於室中但見一室之空居於天井則見天井之空若出戶外則見一方之空若立山頂則十方洞達豁然無礙非虗空有遠近亦非見性有大小為形處所拘而見分優劣而能見之性曾無別異云何差殊上至天宮下至大地中間遍覽物我宛然物類自別見性何殊無殊之性是汝見性前則物可還而性不可還此則物有別而性未曾別若疑此性同於物者則汝亦可見吾之見我見物之時而汝亦見是物故名同見若我離物無見之時汝何不見吾不見之地若謂汝不見時即吾不見之處何以汝見秪可自知豈是吾之不見處耶如此則汝之真性昭然可辨豈得不知若謂物我混濫彼此不分則汝見物物亦見汝豈成安立唐時有大耳三藏自謂得他心通憲宗請忠國師驗之國師問曰曾聞汝得他心通是不藏曰是師問曰你道老僧即今在什麼處藏曰和尚是一國之師何得在天津橋看弄猢猻又問曰汝道老僧即今在什麼處答曰和尚是一國之師何得在河邊看兢渡又問曰汝道老僧即今在什麼處藏不知所答師叱曰野狐精他心通在什麼處凡夫見色乃是眼根現量所知國師所問乃意根所緣凡夫不見而三藏能見誠異於凡矣至第三度意識不緣非惟三藏便是佛眼亦如之何故曰若見不見自然非彼不見之相如此則三藏秪可自知而國師又何能見他人之不見耶若我及汝并諸世間儼然可別曾不雜亂汝見秪可自知而我亦秪可自知此性妙明周鑒萬有胡不即已驗證而取我求實豈為智哉雖然世尊慈悲故有落草之談若是祖師門下待他問如何得知是我真性便與他一百二十棒一棒也少不得使他自知痛癢去在然阿難這一問也少不得何也若有知是知是妄覺若無知是知即無記所以道這箇若是則頭上加頭這箇若不是則斬頭覓活若不是世尊也難分疏是他善解議論便引物令他自認阿難白佛言世尊若此見性必我非餘至遍能含受十方國土前因聖凡所見遠近優劣之不同故未知云何得知是我真性而世尊廣引上下遍覽水陸令其自擇則知物我體殊默然自信此中復以即我見性何有大小廣狹之不等是皆逐塵起見成此妄計耳世尊告曰大小遠近各屬前塵無勞窮詰所以引空為喻夫空本無方而方圓任器見性無性而大小隨緣若除器觀空則方圓何有離塵見性則大小皆無如此則何獨見性六根四大當下融通混入塵界舍那千丈不為大焦螟鄰虗不為小吞吐塵剎法性如是略著思惟即以不堪若能悟旨身心當下本空苟執前緣則窮劫那能見性阿難白佛言世尊若此見精必我妙性至微細發明無非見者佛言如是如是阿難連前發問而有四節初問我之心性各有所還而如來所説妙明元心云何無還世尊引物辨見乃云諸可還者自然非汝不汝還者非汝而誰次則雖悟不還意謂如來與我所見優劣不同將謂別有見性成佛故曰云何得知是我真性而世尊廣引物象令其自擇分別自他乃至云若不見吾不見之地自然非物云何非汝阿難不解無見之見為真性猶滯前塵自疑見有大小廣狹而世尊引空為喻辨無廣狹且物可還而性不可還物自差別而性無差別物有遠近而性非遠近如此開示物我自判可謂明矣何以復問今此妙性現在我前見必我真今我身心復是何物似有過矣蓋由似解雖發真信未明在會大衆莫不有疑故阿難重請要知其過在於何處皆由不悟身心之本空耳前文云我將推窮尋逐以為自心而世尊咄曰此非汝心當時若能截斷何煩許多問答不能領略至此猶著推窮以妄求妄遣賊捉賊無有窮已身心復是何物而世尊乃曰身心器界同是妄緣妄計所成若離妄計則能所皆空妄緣不有則是非本無若能除器觀空信非方圓即器辨空而難為即信在會大衆原依幻有身心辨彼虗妄緣塵寧能不疑前云一迷為心決定惑為色身之內不知色身外洎山河大地咸是妙明心中所現物雖已發明猶處疑惑自下文殊發起方信無有二月阿難故問見性實我而身非我世尊乃云是見非見總屬前塵是我非我皆名幻質離身則無我可得離塵則無見可名復是何物恰是背海迷漚現在我前還同目漚為海然我輩講論之徒當一一消歸自己不解緣興件件都言聖賢分上於是大衆非無學者聞佛此言茫然不知是義終始至故能令汝出指非指非無學則簡於無學也蓋無學聖賢同彼十方如來與大菩薩住三摩地了知見及見緣并所想相同於空華知如空華已不妨即此為用故此見及緣元是菩提淨體於中無是非是現前大衆既非無學不能洞悟本心還依妄身妄心而起能所聞於精見色空非是兩驅所以茫然失守既非凡下所知欲問無由世尊直以自真實不誑不妄用安其心文殊者本師會中為擇法眼既當此任見衆失措所以起座請決也而世尊先告如來菩薩所見本無而凡夫妄執為是非所礙故直以文殊一人以詰其是非而文殊乃云我真文殊何有是非二相問答顯然更無藏隱故豫嘗令人自看我真某甲無是某甲何以故若有是者是二某甲然我今日非無某甲於中實無是非二相能如是看其義自現何得盡推聖賢耶若能親領自己則非是雙離是非既遣則我及見緣皆是菩提妙心所現不了所現妄為色空所轉作是非解其猶二月揑目所成非有他故不揑則二月本無如離妄計則是非非有不悟本心隨諸見聞皆名妄想不能出於是非唯有悟心自然能令出指非指有以馬喻馬之非馬不若以非馬喻馬之非馬用帖此文此恐不然彼但齊物直言無是非而已此中意謂滯緣則是非宛然悟心則是非莫得以此較彼彼為戲論學者當知阿難白佛言世尊誠如法王所説覺緣至云何見明阿難自述湛然常住性非生滅此乃自己默證之境非戲論名相可比彼外道以薩埵剌若答摩所成大等二十三法次第相成第二十五名冥諦冥諦者杳冥恍惚似有而無阿難既親見覺性湛然非生非滅豈得混同冥諦耶真我無我以無我故和同萬有外道神我乃樁立有物與此湛然常住似是而非故請決疑也欲冀混同故引楞伽山與大慧所言外道自然我説因緣非彼境界今觀覺性自然與外道自然有何差別若無差別則如來不應以因緣相破也若有差別其別安在哉夫外道自然者但計諸法自然而強立名言故彼偈曰誰鑿湖海堆山原誰削荊棘畫禽獸本無一法能生是故説為自然阿難既云我今觀此覺性自然逈然自異況乎觀性自然非言説可比豈不云似解而疑者也而世尊意曰我説因緣破彼自然者正説諸法從因緣生非是自然不説覺性若説覺性則言思道斷心行處絶自然與非自然俱不可得如前是見非見等若謂定有自然可得自須甄明有自然體若明為自暗則見亡若暗為自明則見滅如此則前緣常相傾奪何為自然若離明暗等前緣有自然者自不自立如眼之不能自見心之不能自知不知則何以名為自然若執定無自然性者如無手人拳畢竟滅如無眼人見非全無下文云但有言説俱無實義故不可以外道戲論名言以混真際耳阿難言必此妙見性非自然至隨汝執捉自然之性既為所破復疑因緣但不知外道所立自然在於諸法故以因緣破之既云性非自然是非已判何得以性擬相作因緣解耶外道自然者譬如有人生盲其眼外道云此乃自然而盲非有他故如來破云乃是因緣緣宿世罪業因父母氣稟感此殘形若遇神醫授以丹藥障翳若除還得見性若是自然醫不能愈醫既能愈豈非因緣耶誠如所論應是因緣又且不然目之盲明似屬因緣此性若是因緣緣滅則性無如破瓶盆無瓶盆性縱有神醫何能復本見精以性不屬緣故能隨緣變現能隨緣故故能離一切相即一切法即離自在非是融通若欲以世間戲論名相混比真性恰似撮摩虗空徒自勞耳阿難白佛言世尊必妙覺性至妙菩提路阿難以本妙覺心疑混外道自然因緣既以被破復引佛説更冀混同而不知佛之所説正欲破彼世間戲論且世間諸法從因緣生若復離緣則亦無有外道不達因緣執為自然搆此戲論而妙覺性非因緣非不因緣非自然非不自然故稱為妙阿難不解其妙故不得無疑耳且此見性應具九緣所謂空明根境作意分別染淨種子也今唯具四心即種子作意分別染淨眼即是根空明即境舉四具九義已完足世尊意曰我説因緣為破世間非第一義即彼見精因日月燈則能見明離則見暗明暗自異見性無差見無差故二俱名見何為不見以見性無乎不在故無不見且空明等剎那前後應不同時凡夫識粗妄為一念菩薩微細智觀之一剎那中九百生滅彼生滅者是自因緣知生滅者元名見性性非生滅故見明之時見非是明四義成就用例萬法莫不皆然而復見見之時見非是見見猶離見見不能及以緣塵之見非真離塵之見亦妄直須能所雙忘始得言思道斷今欲易明以眼易見見色之時眼非是色見眼之時見非是眼見猶離見見不能及玄覺云若以知知寂此非無緣知如手執如意非無如意手用例見色之見若以知知知亦非無緣知如手自作拳非是不拳手用例見見之見亦不知知寂亦不自知知非是無知以知了然用例離見之見彼云知知此云見見彼云了然此云不及似可信矣而復應知文義聯絡不可偏執見色之時色非是見見見之見猶是名見見若離見見不能及所以前文精見色空離是非是若著前塵種種發明皆名妄想惟悟真覺明性乃能出指非指此中真見無見則是見是物非物非見皆戲論矣阿難白佛言世尊如佛世尊為我等輩宣説因緣至何況分別非燈非見阿難前問云何得知自我真性而世尊逐一發明非優非劣非遠非近非因非緣亦非自然非色非見及非見見妄緣盡遣真性現前不能即信重增迷悶者非不信也直欲未來衆生微細洞究至無疑惑地耳蓋一人見影逈異衆人似乎可信若合國同見災象信之良難故須進退合明始悟真性無見且一眚人見燈五色不可言無若非眚人冥然不見不可言有譬如凡夫見有根身器界山河大地若彼十方如來及大菩薩住三摩地者逈無所有如虗空華若此見緣見精本有則聖人云何不見若此因緣自然境上本有云何聖人亦不見若此見緣是見者見已成緣誰當見見若此見緣非見者今見山河當明何等不了妄計如眚人之執影若解無見便同聖人之真見矣云何名為同分妄見至性非眚者故不名見同分者乃一國同見之災象也用例六道所見根身器界皆為妄計且山河大地六道同見佛説本無如虗空華一衆駭然難為即信故取一人妄見進例一國之妄見用一國之災象退例一人之眚影似乎易解是知別業者在顯同分故也若解一人之眚病為謬則知一國之災象非真例六道所見山河大地見及見緣因緣自然見與見見同名妄計本無所有何也一人一國所見影象同是凡夫餘人無所見者皆號聖人所以進退合明能見山河大地之見是謂明覺同於幻影若悟幻影本空則覺明非是明覺故曰覺非眚中實名見見覺不自立立則成待非是真覺此見若離則覺明不及復於本明覺既不有云何復名覺聞知見所以結凡夫所見同是覺明皆即見眚彼住三摩者真精非眚故不名見阿難如彼衆生同分妄見至和合妄生和合妄死前則進別業以例同分此則退同分以合別業故曰進退合明也障惡合於目病災象合於圓影大小雖異妄業本同故曰俱是無始見妄所生皆於無中妄見有故自一人例一國自一國例閻浮提一閻浮提例四天下自四天下例娑婆界娑婆世界例十方有漏國自微至著自近至遠展轉發明者同是覺明妙心不了本妙妄為明覺成此虗妄病緣且一人一國所見此處見有彼處見無人或頗信自娑婆界洎乎十方諸有漏國同見幻境取信良難故用是例下文云空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有若非如是引例發明於彼必為唐説若能遠離諸和合緣至清淨本心本覺常住覺明者妄明也無漏妙心真明也二種和合不能精了故有同別二種妄見發生見有能所為生死因若能達妄真亦強名蓋由妄因真起真依妄顯若不執真妄亦非有故曰言妄顯諸真妄真同二妄猶非真非真云何見所見是知二者遠離則和合不和合生死非生死皆不可得若解不可得則圓滿不生滅性得常住本心也阿難汝雖先悟本覺妙明至云何甄明合非合理彼暗與通及諸羣塞亦復如是外道所執世間諸法皆是自然而世尊破以因緣阿難云見此覺性自然疑同外道世尊即事辨明知非因緣疑是自然世尊令其説見因緣因日月燈而有其見無則不見世尊告云見物之見同於因緣離物之見猶屬妄明致乎離見之見當名何等故阿難啓曰自然因緣和合不和合心猶未悟何況更聞見見非見由是以別業同分二種妄見進退合明使能見所見皆是妄想與彼真心和合妄生和合妄死若能遠離則俱不可得復由前云真覺妙明非因緣非自然非不自然恐疑妙心性非自然與彼因緣自然和合而起故世尊辨曰若此妙心與前塵和合者和則一而不分不分則明暗色空本無邊畔若見與明和如水之和麵麵就則水失其流明來和見若空之和器器成則空失其虗若見滿則如水之不和於火何處和明若明滿則如日之不和於星何處見和若明見必異何處見雜雜則二體俱亡不亡則應有邊畔合則附而不離不離則明滅見滅云何見暗合既成一則明不自明云何見明明若合見則見不自見云何見見若非和合者惟見與明應有邊畔是見是明以何為界經云非和合及不和合疑是刻訛應云非和合非不和合前二節明非和合後一節明非不和合與上非自然非不自然同一意耳阿難汝猶未明一切浮塵諸幻化相至了無所得上來徵心辨見以至於此同目浮塵幻化者何也阿難墮淫慌怖歸來佛所啓請妙奢摩等最初方便而世尊先不詰其墮淫之謬且徵所發道心以至七番乃云此非汝心前塵虗妄想相惑汝真性豈不已云道心妄想同目前塵逈異小乘昔日聞見故阿難悲淚重重微細請問自屈指飛光使知見性不動匿王請問頗解性無生滅何故目我等輩遺失真性世尊舉指驗倒示其倒因告以晦昧為空結暗為色令悟身心不實阿難復認緣塵所以未敢認為本元心地世尊重引指月之喻主客自分辨見八還緣心自異若此不還是我心者何聖凡所見優劣不同也謂別有性能成佛者云何得知是我成佛真性而世尊廣引上下所見之相雖復有異能見之性正等無差即物之見尚可混同離物之見非汝而誰阿難復疑見有大小遠近而世尊告以總屬前塵離器求空方圓何有阿難頗信見性現前而反疑身心何物世尊懸指萬象色空令其自擇中間尚無是見非見何處更有是我非我由是一衆茫然所以文殊為決既云本無是我非我何處更有是月非月若悟妙覺明性自然令汝出於是指非指阿難信性非生滅復混冥諦自然世尊逐一甄明使知見見非見復例同分別業進退合明中間既無合與非合何處更有和與不和故語器界根身同名幻化幻化之體其性元真見既如是聽聞覺知莫有不然廣而推之以及五陰六入十二處十八界相偽體真隨緣不變妄真交錯理事如如無生死可出無涅槃可證無煩惱可斷無菩提可成若肯承當便好歇心恐餘惑未消故再勞開示阿難云何五陰本如來藏妙真如性般若名為五蘊蘊以積聚為義陰以蓋覆得名由色而起受想是名積聚逐妄背真是名蓋覆然此五陰攬六塵為體發識為用自受想行識以及法受想行識應具六種而又前後生起各有不同思益經云五陰即是世間而有三種所謂器世間衆生世間智正覺世間也若以眼根現量所緣自色而識以器世間為能緣體生起衆生世間故下文云因動有聲攬聲成根者是也若以意根比量所緣自識而色以衆生世間為能緣生起器世間前云聚緣內搖趣外奔逸者是也若解五陰如相即是智正覺世間故曰如來藏妙真如性也阿難譬如有人以清淨目至色陰當知亦復如是色陰者總指根身器界見及見緣也若人於一念未生之前妙鑒其由如淨目觀空逈無所有所以十方如來及大菩薩了此見緣如空中花本無所有少形念慮所見非真其猶瞪目發勞妄見狂花勞發而曰瞪目者謬實在我非他能為故曰無故不動者用喻覺明空昧瞪以發勞所以相待成搖由是地水火風漸成根身器界此中同目色陰喻以狂花復有一切狂亂非相者喻見與見緣也古人用喻九界色此恐不然上云如來菩薩并自住三摩地中所見見與見緣如虗空花本無所有豈非簡出四聖何由混同色陰耶阿難是諸狂花非從空來非從目出至色陰虗妄本非因緣非自然性喻如色陰非因緣有亦不心生若從緣有既有來往非無處所今觀法法何狀緣既不有何容起滅故取喻狂花非因空有若從心生者既從心生應合有知若有知者去既知緣旋當識處若有處者心中自多一物若無知者去既成緣旋成何物又見緣之時非無分別何以無分別時方號寂常心性故喻狂華非因目有心因妄取目因翳眚二妄本同取喻為近非從空目故非因緣待勞方有故非自然阿難譬如有人手足宴安至受陰虗妄本非因緣非自然性手足宴安者譬如本覺無受無故相摩者譬卒爾生心起苦受樂受不苦不樂受也夫受者單境不成單根不起要在根境和合方起妄受喻如兩手之相合有幻觸生根境如如不覺動念故曰無故能覆正念目之曰陰若此受陰如從境有境自有受不待我知又衆人同見境時則同時具受不應有受不受如月行空貴人賞之為樂盜賊覩之如冤豈有前境選擇而來起此苦樂之受若從根有根自有受何必待緣而起受若必從根有如眼見色出既見境歸當見根若有見者似有一物身中往還受陰無體取喻幻觸若了幻觸之不真則悟受之無受根境兩虗故非因緣待合方知故非自然阿難譬如有人談説酢梅至想陰虗妄本非因緣非自然性前色陰全是自妄故喻目勞受陰待緣故如二掌此中想陰全體無據假覽六塵成此虗想若無六塵則想體全無梅即色塵説是聲塵酢是味塵前人説梅意緣過去所歷之境即是法塵想體若一不應緣色緣塵緣聲緣味而成此一想唯口中出水想體若異應成多想口能出水耳亦應有梅應自流説何無味若必酢想因説而有彼人應合自流若不因説云何水從口出思踏懸崖補足觸法二塵缺於香塵梅應具香文略耳覽塵成想故非自然來處無從故非因緣阿難譬如暴流至行陰虗妄本非因緣非自然性行陰無狀變化密移剎那不住喻之如流年月推遷老少不踰喻如波浪真性靡虧喻之如水若此行陰必我性有即性以觀行陰何狀若必空有空自遷流何預於我若即性者行陰流動性應隨流云何身有童耄見性不變澄湛空寂應非性體若必非性圓鑑去來復是何物若非虗妄究竟起滅何無處所不流而流故非自然流即不流故非因緣性若必流圓明妙湛復是何物性若非流變現隨緣復是何物是故行陰自虗妙性常實唯水頗像故取喻之阿難譬如有人取頻伽瓶至識陰虗妄本非因緣非自然性識依四大猶瓶之盛空起有無見如塞兩孔遙憶過未喻以遠行妄取彼境如餉他國而此識陰非因彼來亦非此去若彼來者如人憶北京時想處非無衆人云何不見北京來此若此去者前境現前云何此身猶在床上昔有尊者心想淫女一日夢與之交遺失不淨乃作念云彼既不來我亦非去而淫事得辦佛説一切唯心不我欺也豁然大悟證阿羅漢是知五陰皆如來藏妙真如性我信之矣古人以捨身受身喻於遠行現陰為此國後陰為他國與上文不接此恐不然現前識想流注念念可證何必遠取後陰耶不往而往故非自然彼此無據故非因緣復次阿難云何六入本如來藏妙真如性至眼入虗妄本非因緣非自然性此中根塵對辨而正辨在根由前五陰即一色陰以辨五陰皆空而不知受等四陰皆依六根六塵而起故須廣破前以清明眼名之為真狂勞花名之為妄此則即彼淨目晴空猶是妄塵故曰兼目與勞同是瞪發勞相何以淨目晴空同名勞相耶前不云乎色雜妄想想相為身既是妄想之相豈有六根非妄想相耶又云色身外洎虗空山河大地咸是妙明心中所現物豈非同是狂華依心現者耶是以六入同目瞪發勞相故圓覺曰妄認四大為自身相六塵緣影為自心相彼則雖云妄認未知所以妄認此中發明與彼可為表裏夫性本無見由塵發現塵滅見亡了無處所明中無暗暗處無明見暗見明性無有二是知此見不由於塵若必根生離彼明暗諸塵當何所見若生虗空空本無知云何有見若必有見既能見塵何不見面若能見面自是空知何關汝入三處本無寧非虗妄緣塵有見非是自然見處無從故非因緣阿難譬如有人以兩手指急塞其耳至耳入虗妄本非因緣非自然性上文眼根取境利故見則取著不假他緣直目根塵同是勞相此中耳根本是圓通剎那無生相可得剎那無滅相可得若非無故塞耳指何物為妄若濫同妄想恐人落於斷見故世尊巧譬曲成真謂無礙辨才也夫生滅剎那不可得者根塵圓泯非惟聲處全無而根處亦不可得故特選其為圓通矣塞耳作聲終日不息以聲處無常故耳根亦無常不有而有非常而常非妄而何是知惟根與塵同是勞相此之聞性若因聲生者耳根寂然因聲顯聞聲滅聞滅滅則更遇他聲應不復聞聞則不因聲滅既不因聲而滅豈得因聲而生若生於根離彼聲塵聞作何狀若生虗空虗空自聞何關汝入三處無聞故非因緣因勞作聲故非自然阿難譬如有人急畜其鼻至鼻入虗妄本非因緣非自然性問耳根圓通故假塞以顯勞誠乎有理何以鼻等三根皆假妄勞以顯妄何也答鼻等三根取境鈍故常與法性相應非假妄勞則顯妄無由何也鼻等三根合中取境合則有知離則無覺無覺則非惟不知塵亦復不知根根塵既以圓脫指何物為妄耶因彼無故急畜則有勞觸因勞故顯於通塞通因塞顯塞因通知通則聞香塞則不聞遞互發生同名勞觸知冷知寒名之為觸聞香聞臭名之為聞聞時非觸觸時非聞二處不有是無體性體性不有豈因塵生亦非根出若是空出空當自聞因勞發觸故非自然多處無因故非因緣阿難譬如有人以舌舐吻至舌入虗妄本非因緣非自然性淡性常恆舌不自嘗因勞發識顯甜苦淡淡不自淡因苦顯淡苦不自苦由甜識苦遞相由藉猶如明暗苦時無淡淡時無苦苦性不有舌何形狀根既不有知乃妄覺是知根塵同是瞪勞若此味知必是真者應有處所既有處所非無指示若生於舌舌不自嘗何能知味若生於味味應自知何關汝入若生虗空舌味何預三處無有故非因緣因勞發識故非自然阿難譬如有人以一冷手觸於熱手至身入虗妄本非因緣非自然性身體如如要待緣顯合則有知識其冷熱離則無覺性同無記然是觸名數頗多所謂病癢細滑等廣舉則六根對境無非名觸此中觸言冷熱論其槩耳夫觸者在冷同冷居熱同熱合有離無其性安在因觸顯身觸無處所身作何狀故知身觸同是瞪勞離彼二塵畢竟無體若此觸知必生於塵熱時無冷冷時無熱塵尚不有何能生觸因觸知身觸既非觸身亦非身身不自觸觸非身生若生虗空何關身觸待合方知非是自然究竟無從故非因緣文云涉勢若成因於勞觸此亦刻之誤者應云涉勢若成因有勞觸意謂因涉有勞不涉則無若言因於勞觸應是先有勞觸後方相涉同彼勞目見華直恐不然阿難譬如有人勞倦則眠至意入虗妄本非因緣非自然性意根無形非如眼等冥然莫辨同幽室見借彼寤寐用辨非真蓋常情以覺為實以夢為虗故先辨夢之不實後論覺亦不真何也夢中所見與覺不差其間剎那流注故憶所不及妄謂為忘豈識元無不了元無稱為意根此根既無實形安有實法故惟緣過去落謝五塵妄謂見聞作生滅解名覺知性全體虗妄非同現量若悟塵之本無則識根亦非有故知根塵同是瞪勞此覺知性生於寤寐寤時或似可即若推於夢身及見聞曾無一物夢既不有為覺豈真覺知夢非人亦頗信夢不知覺豈不其然此有彼無性從誰生若生於意何不自生藉他五根落謝之餘稱為意生見屬於眼聞屬於耳五根各有所屬離五之外復是何物能生覺知因睡有夢故非自然究竟無有故非因緣復次阿難云何十二處本如來藏妙真如性前則塵為根所入而正破在根此中根為塵所處而正破在塵兼破勝義以眼為浮塵根以見為勝義根也入以相藉得名處以棲托立號根執堅固於性為親假喻發明始知為妄故在前破浮塵易辨直指現前令識虗妄故在後破前云若眼能見則諸已死尚有眼存云何不見咸謂見不屬眼誤認真性此中見與色空俱無處所是知勝義非真惟根與塵知覺見聞猶如幻華本無所有若悟不有則全見全聞皆如來藏妙真如性下文例此阿難汝且觀此祇陀樹林及諸泉池至即色與見二處虗妄本非因緣非自然性若謂見必是真為生於根為生於塵若生於色即如現前樹林池沼舉目了然既從色生與色為一應不見空若言從色生故色不自見正合見空現前林木池沼應無所矚若彼色空同一見精所覩是知此見不從色生矣若從根生色從眼生與眼為一空非所生應不見空云何空色了然曾無偏覩豈得色相偏從眼生耶若謂此見不從色生黑月無色云何不見不能了色若言不從眼生則他方外國眼根不到云何不識二處不有見如空華妙鑑萬有曾無留礙豈不為之妙真如性矣因色顯見故非自然色見俱非故非因緣阿難汝更聽此祇陀園中至即聽與聲二處虗妄本非因緣非自然性聞性本妙生滅圓離所以八音俱作歷歷同聞雖則同聞前後相續曾無錯亂此之聞性若是聲來耳邊阿難得聞餘處無聲何以一衆齊聞豈應鐘聲分應他耳耶分則鐘具心識不分則同時聞故不獨來阿難耳邊矣若必不來云何近則得聞遠則不聞若復耳往聲處阿難之耳已往鼓處餘處無耳何以鐘及象馬種種音響歷歷齊聞齊聞則不往聲處矣若必不往如人不入北京彼中音聲何以不聞故知耳之與聲聽及不聽皆為幻妄了此無真即本妙心矣問曰辨則言聞結則言聽惟聽與聞有何差別答曰聞則本然不同生滅聽則作意以作意故斥為幻妄如前勞目等是也因聲顯聞故非自然聲聽俱非故非因緣阿難汝又嗅此爐中栴檀至即嗅與香二處虗妄本非因緣非自然性鼻以合中取境取必待於緣生以待緣生故單根不生若必根生鼻合自香何藉他木若必不藉鼻不自聞説聞非義因聞識香香就外入從外入故鼻不生香若生於木木自有香即合己聞何藉爇煙方聞香氣若必煙木四十里外非煙非木云何聞香若必非木別然他木何不聞香若必非鼻眼耳何不嗅香即離俱非是無可是實如幻華了無窮詰妙性如是豈彼有因若生虗空空無間然何藉爇煙有聞不聞阿難汝常二時衆中持鉢至即嘗與味二俱虗妄本非因緣非自然性淡性常恆舌不自嘗尚不識淡何能識味若知味性必因舌生甜苦辛酸各有元因受食之時甜苦宛然離食之時舌作何味一舌多味互推無有非妄而何若言知味必非舌生身觸食時甜辛鹹淡云何不覺是舌非舌同名幻華非舌即舌元名藏性若此味性必生於食食不自知食若有知應具心識若具心識食自辨味何預阿難若此味性必不因食酢何不鹹蜜何不苦若生虗空噉空無味味不空生空如有味鹹則恆鹹頭面受鹹同於海魚何得虗空選擇持鹹汝舌舌味和合起味知性故非自然無本可據故非因緣阿難汝常晨朝以手摩頭至即身與觸二俱虗妄本非因緣非自然性觸無方所待合方知故引摩頭乃顯知覺在身為能在手為所然則身不自觸藉手能摩身為所摩惟能與所了無可定寧非虗妄手摩頭時與頭為一若摩足時頭則無知何況四肢百骸隨按隨知了無定所若各無者則冥然無知何者名觸若各有者則成多觸何觸是汝不應身外別有一物與汝為觸待觸顯知故非自然身手二無故非因緣阿難汝常意中所緣至則意與法二俱虗妄本非因緣非自然性意無別塵緣彼五根過去落謝之餘以為法則何為法則若善若惡俱有規則故也若此善惡法則離彼色聲香味逈無所有純一無記此之法則若即心所生法即是心何得逆緣五塵稱為法則若離塵者心作何狀稱為法塵若離心別有方所非無指的色聲香味各對五根何者是離心之法縱許有者法之自性為知非知有知則同他人何預阿難若言即法即心何故心分有二若非知者現前明暗色空了然明鑑離此之外更有何物名之為法若許有之不無表示豈應人間更有空外之物耶是心非心離法即法俱無處所非妄而何逆緣成塵故非自然法則本無故非因緣復次阿難云何十八界本如來藏妙真如性根境如如本無能所識居其中立內外見故稱為界夫識者切近於心識妄良難故先破根塵識居其後何也五陰乃一期幻質為六根所依塵不自知因根顯相根亦無知識托其中故有分別若能造之四大不有所造之六根亦無根既不緣塵何所偶根塵無處縱有其識欲將何用是知如來破妄顯真無次第中成次第耳阿難如汝所明眼色為緣生於眼識至則眼與色及色界三本非因緣非自然性此乃昔説根身生起之緣今顯藏性逈異昔時用質前疑故曰如汝所明指前七徵文中我所説中非此二種眼色為緣生於眼識眼有分別色塵無知識生其中則為心在世尊引彼為破汝言識居根塵之中為因眼生為因色生若因眼生眼不自知離彼前塵無可分別若言不假前塵而有分別者汝之見識為是青耶為是黃耶既無表示從何立界若從色生識應是色色滅識亦應滅滅則誰知空耶色耶如亦識空則知色自遷變識何去來識不去來界從誰立若必見識根塵共生一半屬根一半屬塵合則為一識性自離在色即色在根即根何者是識與汝為界離則兩合知自還根不知還塵識作何狀齊何處所名為識界若不兼則非根非塵界相自無惟根塵識三處都無故非因緣妄依真立故非自然了妄無有藏性始在阿難又汝所明耳聲為緣生於耳識至則耳與聲及聲界三本非因緣非自然性上文以眼色二處破無界義此中復有三處聞耳與聲也界以限別為義蓋顯耳聲各異故名為界此二若有許因有識若此二者本無何者名識前處入文特斥根塵不有今則權依根塵定其不能生識此識若生於耳如無動靜耳不自聞不聞則不知耳作何形若生於聞聞不自聞若必自聞彼動靜等應非外物聞無相貌耳即觸塵何得相雜共生識界若生於聲聲則自知知則聲具心識何關汝聞汝若不聞則亦不知聲之所在如或知聲非識聲有若實不知同於草木妄計生識故非自然本無可憑故非因緣阿難又汝所明鼻香為緣生於鼻識至則鼻與香及香界三本非因緣非自然性先定鼻之所在識因鼻生能生之鼻尚無有名所生之識當有何界次辨知之所屬非肉非空并非香知知尚不有界從誰立若因香生香不自知誰知香識知香則不從香生不知則不可名識香不知香因何立界識不知香則識界非因香立阿難又汝所明舌味為緣生於舌識至則舌與味及舌界三本非因緣非自然性若此識性因於舌生何藉甘蔗烏梅等物稱為知味若味必不生於甘蔗等物汝自嘗舌為甜為苦舌若是苦應不自嘗誰知為苦若實是苦與苦為一應不知甜何況甘苦辛鹹有無互知知尚無定何者是舌生之識識既不有將何立界若識必生於味味自有知分別甜苦即同他人之舌何預於汝以不預故誰知是味非味味非一物舌無多體若和合為一應無分別無分別故尚不了味云何生識若分別宛然則識不味生若舌味和合生識離則識無云何識界阿難又汝所明身觸為緣生於身識至則身與觸及身界三本非因緣非自然性若此識必於身生身應自觸何藉合知以合知故離則知無身何所識若因觸生則未合已前應無汝身豈有無身而能知合耶單境無知則知不觸生根不自覺則知不身生物不觸知身知有觸成敵二邊似乎有界及乎知身即觸知觸即身互無一邊則界不成立合則有知可名即身離則無覺寧不同於虗空知與無知剎那不定當從何處生汝身識識尚不有因何立界阿難又汝所明意法為緣生於意識至則意與法及意界三本非因緣非自然性若從意生生不無緣緣思有識離緣則思無可思思既無思云何生識縱有能生識將何用惟心意識一體三名曾無三法別則三法宛然既能生識何不生心心識亦然同則名意即意心識本無名心即心識意何有識亦如是互有互無徒有妄名曾無實體體性不實界從誰立若因法生若即現量分明五塵現對五根何名意法能生於識故曰法法何狀若即比量過去剎那不住何法當情識從法生若言即彼生滅是名為識生則色等法生滅則色等法滅何者是識同彼生滅識同色等法生則空色宛然識同色等法滅則分別都無既無分別識何形相識無形故則識界不成云何識法若根塵合生五塵既對五根何者意根合法生識阿難白佛言世尊如來常説和合因緣至中道了義無戲論法阿難既述和合因緣皆世間變化似知常住真心非和合因緣矣既知非是和合因緣何以復混因緣自然而興此問蓋謂根身器界分親疏二分故根身義親在前已破器界義疏亦冀發明故須再請非重復也上云不知色身外洎山河虗空世界咸是妙明心中所現物雖則根身器界二分兼破而所破在於根身此下地水火風空見識亦以二分兼破所破專於器界雖則義似連屬而親疏自分若混同今昔而問則阿難實是無知何也上文佛云我説世間因緣非第一義以有明示何更問耶爾時世尊告阿難言汝先厭離聲聞緣覺至如旋火輪未有休息上云必妙覺性非因非緣云何常説具四種緣而世尊云我説世間諸因緣法非第一義而不知何者是第一義故以世間因緣為問而世尊明告汝先厭離聲聞多聞無功不能免離摩登伽難啓請如來妙奢摩等最初方便故我發明藏性逈異世間云何復混因緣自然而自疑惑其由真藥現前而不能識也夫世間之相頑礙不融若定執不和如虗空之不和于色則世間不成安立若定執和合則明暗色空不可分辨若亦合亦離則生死死生無有間息何因而得出離耶如來藏性又且不然能不變隨緣故即色即空似乎和合求其體不可得隨緣不變故非色非空似不和合而大用現前欲除戲論當究於是矣阿難如水成氷氷還成水氷元依水無外有體水因風結即為之用喻一切法皆依藏性以為其體性循業現有世間相如此則全相即性更非他合非合則非因緣以循業現故非自然性真如是非是強言若欲混同和合者如水成氷豈與他合而成氷耶雖然始終之義不可不辨始因不覺生起地水火風成世間相外道無知目為自然世尊以因緣破彼自然以不覺為因動念為緣非因所因不有而有如水之成氷因於時節緣於朔風以成其相衆生執相迷性枉受輪回故佛出世指明本事令識本性如指氷即水無外因緣和合成氷外道離氷求水二乘堅執不融此中發明根身器界全一藏性曠劫無有他物誰受生死故不同於戲論汝觀地性粗為大地至但有言説都無實義水之結氷信非和合塵之成地和合宛然析之又析體性全無將何為合塵之與地皆土大之異名如氷之與水曾無異體無異則不可稱合析之見空不見色色尚不有何物合成微塵合之則見色不見空空尚不見與何為合是知如來藏性不和而和非合而合識心計為自然因緣皆名戲論何也若定執不和實由聚塵成此地大若定執和合析至無色則無物可合若必自然則何假聚塵必非自然則誰堆山嶽若非因緣則何名不覺若必因緣性同斷滅蓋如來藏性不變隨緣則三法宛然隨緣不變則一法叵得性相雙融體用自在故涅槃稱為祕密藏也故云但有言説都無實義非惟阿難問處無門便是世尊答亦失路徑庭之旨孰解承當阿難火性無我寄於諸緣至但有言説都無實義古人畫卦乃曰離中虗即虗心無我之象也夫無我者無所不我故地水風皆具火性性雖本具要假緣生如木中之火鑽則火現石中之火擊則星流大海之水風摶火𦦨空中之火假於艾鏡衆緣假寓則非和非合不應無從自有則亦非不和合識心妄計強執成謬若離言説則所計皆空何也若因日鏡彼各一方火之來往應有形迹若不因日鏡對水求火火則不生故前文所謂非因緣非不因緣非和合非不和合難思境界惟聖乃知少形思慮已遲八刻阿難水性不定流息無恆至但有言説都無實義火性隨寓故稱無我水任高低故曰不定常流則從人洎天皆從滔溺常息則世間萬物無可資養妙適時宜豈非藏性若必和合月陟天上珠因手持天淵相隔何處和合而能出水若必天來人應可見既不能見非從月降若必珠出珠應自流珠不自流珠出非義然亦不是無因自有亦非不和合矣又如思憶前人或憐或恨目中淚流心想酢梅口中水出心憶珍寶身體光潤如是水性周遍法界隨念成辦寧非循業阿難風性無體動靜不常至但有言説都無實義覺明空昧相待成搖故有風大然此風大動則風生不動則無故曰無體且阿難動衣風拂彼面風非衣出不從面生虗空寂然不相參合三處無有體性原虗凡夫粗識以謂移山吼木偃草興波者風也細以觀之世界動時觀身動止觀心動念莫不皆名風大外則遍界拂衣內則一衆動念循業如是有何處所少形思慮却屬妄緣阿難空性無形因色顯發至但有言説都無實義出土多少見空深淺所謂因色顯發者也地等四大是別空大是總總別相收均名五大周遍互容無乎不在故稱為大以其互奪互容互隱互顯以互隱故盡為大地包於虗空之內而不知虗空含於微塵之中以互顯故出土見空義性如是寧容窮詰故曰但有言説都無實義若因鑿出鑿自出土空不自生出土見空義性乖戾不因鑿出凝然大地何處見空奪則色空兩立各有邊際泯則色空兩忘各無體性惟此空性具包十大故居四大六根之中統攝情與無情之內以其無生而無所不生故出土見空雖生而未嘗有生故鑿自出土二乘不了欲棄生而求無生安知生即無生故出土可喻矣無情器界如是有情根身豈有不然空居兩間發明正等阿難見覺無知因色空有至但有言説都無實義自八還辨見以來至於阿難自陳不能於萬物象前剖出是見非見一衆茫然文殊啓請此諸物象與此見精元是何物而世尊答曰本是妙明無上菩提淨圓真心阿難混同自然因緣及與和合世尊逐一發明阿難雖悟見性如是恐不能廣推陰入處界故展轉發明阿難洞悟根身未融器界重復啓請所以經文聯絡前則自根身推及器界此下自器界而推及根身遞互相成如來藏性示諸指掌所謂情與無情共一真也上云不能剖出是見非見而未知何以不能而世尊指見與色空共相推檢一體不成歸體猶乖非同不同或異非異實所謂言思道斷心行處絶均彼無情同名六大備舉覺聞包羅十法皆如來藏妙真如性也既無是見非見可得何有一體異體之名若能悟旨成佛於塵點劫前總饒未會也秪是落泊王子義性如是非謂強言直下承當何有不悟阿難識性無源至但有言説都無實義由塵發見因根有相相見無性同於交蘆正指無源之識性也單根不顯知單塵不顯相識居兩間分別成用推其體性了不可得故曰無源根境相對本是如如無可分析識於其中次第標指離根則識無所寓離境則識無所知若必無知則誰辨色空明暗無寓則孰是眼耳鼻舌必無根塵此識應出虗空若必空出則非相非見非見則誰識空色非相則孰立覺知無識無覺寧不等於虗空有識有知應不同於物象若必無因應離緣別識他物見托於相相推於境識作何狀若必有狀應有可指離根離境何者是識若無可指其體本無寧非藏性若悟識性原無則知見聞知覺與前地水火風以及一切萬法一一稱性周遍圓滿須彌芥子各不相妨前文覺觸覺知總括六根此中見聞覺知總括六識上文地及五根皆曰清淨此中識心有了別功能故稱妙覺若論循業一處求水火風則一處現遍法界求則遍法界現識心循業未有不同故均稱為大根身器界其性如是無生死可出無涅槃可證是佛了義之談今時之輩願東願西捨此取彼何其謬哉爾時阿難及諸大衆蒙佛如來微妙開示至於如來前説偈讚佛始於徵心辨見終於七大遍融中間縱奪破斥發明真心藏性謂之微妙開示也向執身外有身未明真亦同妄至此真妄雙融是非俱泯心同七大之遍周故曰心遍十方七大皆依真心而幻立故曰虗空世界皆如手執葉物依心幻立則全體皆心故曰皆即妙心世界依心幻立色身又依世界而住故世界虗空比於葉物宜乎色身比於微塵前云不知色身外洎山河虗空大地咸是妙明真心中所現物至此方悟下文云空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有述讚於此雖然我輩講論之師當自揣摩即今身心為在虗空外耶為在虗空內耶如未得恁麼相應切不得講過去了妙湛總持不動尊至不歷僧祇獲法身妙湛即真諦般若總持即俗諦解脫不動尊即中道法身初則阿難啓請妙奢摩他三摩禪那最初方便世尊徵心辨見特以明悟常住真心為初方便也自阿含以來所聞三諦之理未會真心次第熏歷不名究竟堅固今也既悟心已融真會妄均名藏性故一切事至此為究竟堅固矣一心三諦圓融無礙自在如王向所未聞今乃得聞故曰希有向所聞者修一分三德證一分法身斷一分無明此乃諸佛之常談今也一念頓消億劫倒想不假僧祇而獲法身豈非希有耶古人有謂阿難解悟非謂證得有以謂在指大衆非阿難一人有謂神力暫令得見豫謂不然本有之性一見永見豈因神力暫見既云各各自知心遍十方豈有彼得而此不得耶阿難後進二果其進在位非為法身而有增減且法身有證德一證永證喻借誕生王子天然具足有父在位暫寄東宮豈同臣子之求得者乎又如儒子即彼童生所詣之理與三公等其升進者在位非謂文章若以位難理沒劫無有見性之人以理撥位則一衆皆墮上慢之謬下文云理雖頓悟承悟併消事須漸修因次第盡可為明證矣願今得果成寶王至爍迦羅心無動轉法身有證德故言獲智身有報德故言成化身有大恩德故度恆沙之衆法身已證報身未成故興此願梵語盧舍那此云福德圓滿利濟無窮故稱寶王分身塵剎遍應九界是為化身三身圓應不縱不橫不並不別是為深心如是深心餘無能知惟佛證明不捨惡而求淨當即惡以修行故誓入惡世以度衆生也願成寶王即佛道無上誓願成度恆沙衆即衆生無邊誓願度願成寶王必學無上法門誓度衆生必斷無邊煩惱四弘既備可謂深心我誓如是更冀慈悲微細開示令我速成空性無殞尚可銷亡我心堅固終不可動爾時富樓那彌多羅尼子至所説法音尚紆疑悔滿慈先説如來四諦法門佛推第一今則微妙開示第一義諦尚不及見何況得聞取喻聾人佛意本欲令我得悟而不知反增迷悶我等無學之徒尚紆疑悔何況阿難未除習漏蓋由小乘教中説世間萬法皆是無常從因緣和合而生今聞藏性本然非因非緣非和非合法法真常逈異昔説故有此請若據內祕外現一一無非垂範後來世尊若復世間一切根塵至次第遷流終而復始滿慈已證真空未諳妙有以真空故理合清淨本然未知妙有事能循業所以執理有迷事之失即事有亡纍之玄上文既云妙覺湛然遍周法界含吐十虗循業發現可謂事理全彰廢立俱備滿慈據現前實證以為請端欲使即事就理發明無惑耳昔者長水法師於此有疑特問琅琊覺禪師曰清淨本然云何忽生山河大地覺曰清淨本然云何忽生山河大地長水大悟且問答無二長水悟得個什麼諸方具眼者檢點看未過關者不得作文字消却又如來説地水火風至欽渴如來無上慈誨上文執性難相清淨本然不應忽生山河大地此中執相難性空色不容水火不合云何均名藏性周遍無礙夫執相難性似乎水火不融若以性融相色空何有譬如木中具有四大鑽則火現絞則出水搖則生風燒則成土若以未發之前求不可得性無不容何有間然若以已成之後則水火風土各異能觸若謂不融則木中應有水火界畔若為定融則世間空色不分故前云但有言説都無實義豈滿慈不解直欲微細辨明使後來者必信耳爾時世尊告富樓那至欽佛法音默然承聽有世俗諦有勝義諦聲聞破有入空以證勝義故上文云十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有是以有學之輩不免茫然滿慈既登無學同彼所見故曰清淨本然不明循發故問云何忽生山河大地執體迷用大乘小乘依此別矣蓋小乘人但知破有證真不知從體起用豈知真勝義性本來如是故墮定性之失也未得二空者聲聞已證人法二空未證人法二不空故未能回向上乘已得空故故問清淨本然未得不空故故問云何忽生山河大地若能了達空不空義修因證果皆契一乘矣佛言富樓那如汝所言清淨本然至覺湛明性性覺妙明者明即非明也本覺明妙者無覺即覺也以真體無明而無所不明妙用非覺而無所不覺體用如是非可強名汝今問我云何忽生山河大地似欲強名也故上云汝今諦觀法法何狀下云一人發真歸元十方世界悉皆消殞是知滿慈之問如來責其欲強名矣汝既欲強以名之所謂覺所謂明為復性本是明稱為覺耶為復性無所明要因所明顯於能覺稱為明耶若性本明則逈離能所尚無能明之明安有所覺之覺能所既無指何物為山河大地為覺不明正指滿慈痛處故滿慈亦以世尊詰處為問若此真性非明則無所明故世尊告曰汝謂不明則無所明因汝有所明故故問云何忽生山河大地若無所明則誰名山河大地有所故不名真覺若無所明則明及無明皆不可得為遣明無明故權名覺湛明性若明及無明二俱遣淨則覺湛明性又非可得矣故曰言妄顯諸真妄真同二妄猶非真非真云何見所見即此義也性覺必明妄為明覺至因此復立無同無異釋成上文無所明則無明覺之妄有所明非是性覺之明若無所明者非惟無有明與無明而覺湛明性則不可得云何不可得耶以性必明本無能所因立妄能便有妄所故名明覺覺既本明豈因所明而顯覺耶原因妄能而立妄所既因妄立所還因所立能以真妄相對故以真體為同以妄想為異以能所相對能立為同所立為異能立即是覺明所立即是明覺下文以虗空喻同以世界稱異性覺真體本無同異背真從妄則熾然成異本覺之性常一故同所覺之相常別故異覺明異明覺之異故因異立同欲雙遣同異立性覺之明故曰無同無異是皆因有所明故有明有無明及覺湛明性若無所明者則非明非無明及非覺湛明性矣如是擾亂相待生勞至彼無同異真有為法真性本無能所而能所妄立故成擾亂能因所立所因能成遞互生起故相待生勞勞非有因如目精無故不動瞪久勞生則於虗空別見狂勞華相渾濁淨目引起塵勞作有無見虗空為無為同世界為有為異雙遣同異復立無同無異即如雙遣真妄立彼覺湛名字即有為法此皆因有所明而有如是相待妄名若無所者尚非覺湛明性何有明與無明先起塵勞煩惱後現虗空世界是為因能立所下文三種相續先於覺明空昧者是為因所立能故名相待覺明空昧相待成搖至以是因緣世界相續妙覺本明元無能所由空昧故能所成待故因能覺立所明還因所明顯於能覺二者相待同依無明不動而動故有風生以風性無體仗於動靜動則生風靜則風息因搖生風理必如是初動生風動久成礙生風則覺明相待成礙則明覺立堅是為純所遺能堅執不動故成金輪動久成堅堅久復動動故生風風屬木木能生火以風金相摩者如世取火鑽木得之也火尅金而金能生水故有水輪以火金有夫婦之義故能生子水從金生性從下潤火從木生性必上升故曰交發金乃土之屬堅燥為洲潭水性流動為巨海水因蒸金生潤則水受火金之氣故海中現火土受金火之氣金能生水故江河常注坎為水中男之位性屬陽離為火中女之位性屬陰夫強妻弱陽氣剛盛故結為高山即火升之義土寄位於坤屬於陰強陽弱故陰氣上升抽為草木所以擊則成焰融則成水燒則成土絞則成水皆不壞氣分也金木水火上遞相成尅而亦遞相發生延接為種所以世界相續前文云空晦昧中結暗為色而未知何以為色此中微細辨明生發有因非為唐説儒道二教雖談五行生尅之義而未知何以生有五行莊子目為自然昔有道士以此叩問大慧而大慧不能答後閲此經撫几長歎始羡此道士善究此理者也復次富樓那明妄非他至同業相纏合離成化明覺之妄豈有他謬謬在覺明是謂因能立所也覺明何以為謬蓋滿慈不解本明本妙而計能明所明所既妄立還生妄能由是眼能見耳能聞乃至識能了別開則有六合則惟四眼見耳聞舌知身覺鼻亦稱聞意亦稱知成就變化各局其能纏彼同業以逐其類見明色發明見想成至以是因緣衆生相續非局而局故見明覺之色是亦因能而見所也非見而見還復因所而成能也能所皆妄是為以妄逐妄憎愛由生且憎愛均想何以獨言流愛為種豈憎不為種耶蓋言其多分耳故圓覺云一切衆生從無始際由有種種恩愛貪欲故有輪回憎則不願同處故下文敘人死為羊者憎亦成種故知但言多分也洎談四生胎因情有卵唯想生可得言愛言憎濕以合感豈非阿附化以離應實由欣厭所以變化合離但論大槩矣古人以中陰所見用消此文恐未必然而世尊因滿慈所問清淨本然云何忽生山河大地故直敘根身器界生起之由彼時尚無現陰可得指何者為中陰耶富樓那想愛同結至以是因緣業果相續父母子孫具指四生非特人道故圓覺曰卵生胎生濕生化生皆因淫欲而正性命當知輪回愛為根本此云貪欲為本與彼符合遞相延種本於貪淫是為愛想遞相吞食本於殺貪是為憎想人復為羊羊復為人遞互相酬雖本盜貪而實憎愛相待為種愛極為憎憎極成愛淫亦名盜殺亦為盜具如律辨惟淫殺盜舉一而三如惡叉聚生必同科貪瞋癡言三而一是故生生世世常在纏縛富樓那如是三種至因此虗妄終而復始結前三種相續明妄非他覺明為咎因覺明而立明了知性即明覺也因明覺而生妄能即了發相因有妄能妄所妄見山河大地不局而局非有見有惟終與始同一妄情富樓那言若此妙覺本妙覺明至何當復生意謂本妙覺明生佛無異無異則最初無故妄動生此山河大地如此則未動已前與佛一體一切衆生皆證本覺清淨妄動故生山河大地諸佛今雖已證還同衆生妄動不若妄動者清淨本覺一體何分衆生動想則生世界諸佛動念豈得不生若實不生生佛何得無異若必不異何時更生山河滿慈以在纏佛性難彼出纏佛性也夫佛性喻如金礦諸佛所證如出礦真金雖歷萬劫金性不變故圓覺曰一成真金體不復重為礦雖復本來金終以銷成就衆生所迷如在礦之金而有多種分別一者不信礦中有金即一闡提不信凡夫有佛性二者雖聞不辨別拾頑石用力煅煉雖歷塵劫終不得金即彼外道終不見性三者雖信礦之與石都不能辨亦不知修煉之者即彼盲修凡夫四者雖能辨識不知火候煉磨以成不得見金即彼析色聲聞前云不能得成無上菩提別成聲聞緣覺及天魔王者此也五者雖知火煉不解文武既濟即彼出假菩薩六者善解文武火候用中道智煅煉出金少分即十住菩薩如是增進五十番煅煉乃具得精金方證妙覺滿慈不解如是次第故興此問實為要問也然則此疑非特聲聞菩薩有之圓覺經金剛藏菩薩問曰若諸衆生本來成佛何故復有無明若諸無明衆生本有何因緣故如來復説本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱問則此略彼備答則此備彼略影響可以合看是下連引五喻發明問意可謂慈悲之至矣佛告富樓那譬如迷人至菩提涅槃亦復如是方本不移迷者謬執若悟本方自悔其癡所以十方如來及大菩薩以其自住三摩地者見此世界本無所有如虗空華衆生妄認覺明執有明覺有世間相然此諸相非因迷有如方之不因其迷而為之動移也亦非悟無以諸相本無妄計成有若離妄計必不可得如所惑之方本非南北計為南北若離其迷南北宛然向所迷者自知為謬如此則非特諸佛證之名為本無當其衆生迷時何嘗為有此答其無狀忽生也苟能妙悟則何者是世界無狀忽生諸有為相次引翳華喻者答其有為習漏何當復生夫空本無華翳病之謬不了翳謬妄認生滅以是為狂欲望更生狂而又癡此喻有三初因翳眚無見生見不有而有喻諸凡夫迷於本覺見世間相次則翳除華滅不了翳過計華已滅無滅見滅不無而無喻諸聲聞妄執有得滅世間相三則見華滅已欲望更生正中滿慈所問世尊引喻令其自陳一答并消可謂巧曲開示者也法身有證德如礦中之金涅槃有斷德如木之成灰所以上二喻者理須頓悟承悟并消下二喻者事假漸除因次第盡若無前喻則外道有長邪見之愆若無後喻凡夫起撥無之謬長邪見者外道以為本無佛性因修乃得如不識礦別煉他石歷劫不就撥無種者凡夫雖知本有佛性不假修行如執礦為金終不成用若謂礦中本無金性別煉他石何以不得成金性雖礦有要因煉得若不煅煉礦石終不成金凡夫若無佛性修功煉行終成唐棄雖則本有而為煩惱所雜要因修得故在纏出纏不異而異矣滿慈問處有二一問云何忽生山河大地二問地水火風不合相容答初問已竟此下答第二問富樓那又汝問言地水火風本性圓融至故發塵勞有世間相虗空是一諸相是異一異發揮不相障礙亦不混雜以不礙故日照則明雲屯則暗以不雜故彼此明歷空日宛然諸相之傾奪不停而虗空之寂然常住以互容故彼此具現此是山此是地此是萬象森羅乃至世出世間一切諸法一念具彰宛然帝網以互奪故明不是暗暗不是明以互攝故舉一虗空而具萬象地水火風隨舉一法而各各具攝何為俱現時人所見盡謂虗空無形洞豁無礙故能普容色法堅礙豈能俱現故世尊引日為示且日一種而能隨人所見兩人見日不同而千萬人見日亦各隨異廣而推之四天下人咸謂見日各對其面及川河淮濟江海溝瀆之中皆見有日日惟一輪所見各異若謂分開則天無二日何況千萬若必不分彼人於東西溝瀆等處各見其日名為何等若欲以識心辨的縱盡如來神力莫知所以云何俱攝虗空洞豁萬象包含人或可信色質堅礙容攝難信且如木質堅礙而能具攝四大鑽則出火絞則流水搖則生風燒則成土堅礙之色尚能具容水火風大莫有不然相容不容各現俱現皆不得而思議也體隨於用色空傾奪萬法齊彰用順於體色空齊泯一道坦然如此則心不得而思言不得而議滿慈欲問無門世尊答亦失措常住真心於此見矣我以妙明不滅不生合如來藏至故發真如妙覺明性阿難以色空相傾相奪而如來藏循業發現故有世間相用答滿慈云何忽生山河大地此中不生不滅合如來藏故發真如妙覺明性用答妙空明覺何當復生山河大地以如來證妙覺故於一切法無生無不生故以無生故惟妙覺明無不生故圓照法界以圓照故即體之用一為無量即用之體則無量為一小中現大如目包世界大中現小如須彌納芥不動而遍彼此無礙也身含十虗者各各互容也依中現正正中現依皆由滅塵合覺勢使然也非是強言復有互隱互顯互縱互奪相即相入成己成他一如華嚴廣明而如來藏本妙圓心至用世語言入佛知見以理融事則一切俱非似事融理則一切俱即事理雙照則凡聖宛然事理雙泯則生佛何有阿難執妄迷真妄生欣怖世尊語以自他不有真心常住自徵心辨見以及五陰六入十二處十八界本如來藏妙真如性以示其體以謂一切俱非者也滿慈不明循發問云何忽生山河大地及四大相容不礙世尊答皆由覺明明覺二種妄惑故有三種相續以示其相所謂一切俱即者也若悟真心則言思道斷心行處滅圓融照了可廢可立所謂離即離非是即非即直入中道不思議境非二乘之所知矣所言用世語言入佛知見嘗謂聲聞緣覺而不能知今時講學之徒莫有不中其病矣譬如琴瑟箜篌琵琶至愛念小乘得少為足上云用世語言入佛知見非也然亦不可盡廢凡夫執有迷空二乘破有執空各得一偏不名中道皆名世語若是如來所説非有非無非不有無非真非妄非不真妄非自然非不自然非因緣非不因緣如是開示直入不思議中道了義證入佛乘鮮不由此故非世語可比何也佛性本有若非如是開示者何由而得佛乘也喻如琴等雖則本有妙音若無指法何由而發是知言亦不可盡廢矣所言妙音者衆生佛性生佛等有佛得指法故發妙音衆生不能徒成亂彈耳如是則當棄世語而學中道毋執小見而生滿足諄諄誡勸如此佛恩何以報哉富樓那言我與如來寶覺圓明真妙淨心無二圓滿至是人心狂更無他故滿慈初問云何忽生山河大地次問地水火風不合相容以及七大中循業發現隨衆生心應所知量恐在會大衆未知循業所以故興第三問而世尊答以覺明明覺二種妄緣生成世間三種相續若悟本心則悉皆不實若如所諭則根身器界同是妄緣迷妄所成則未迷已前與佛本覺曾無二致衆生無端忽迷有世間相而未知諸佛亦有迷時生煩惱不若佛不迷則衆生何故忽迷若衆生忽迷則諸佛何故不迷而世尊引迷人背方非謂方移迷者自咎知者常覺不迷若迷人因指得悟無復更迷也而滿慈復謂迷有因緣故興此問意謂我及衆生同佛本覺無二圓滿則知我等由迷妄惑狂受輪轉而未知何因有妄世尊引演若迷頭為喻豈有其因但因狂故愛鏡中頭自責無頭無故狂走鏡中頭有二意所謂欣怖文似有缺阿難見如來紫金光聚勝妙殊絶由是渴仰從佛剃落者似愛他頭瞋己無分而狂走者也因墮淫舍為摩登所逼而起慌怖似瞋他頭自羡己頭而欲避走者也不知皆是自心無故取捨忽生欣怖同名狂走阿難展轉請問世尊微細發明莫不辨此鏡中頭矣及乎五陰六入十二處十八界以及七大周圓皆如來藏妙真如性何所不該妄生取捨是知惟瞋與愛總是失心狂走豈定有因復令滿慈自供者使必知無因也所以洞山云失曉老婆逢古鏡也心生瞋嫌與此愛頭正相對耳馬祖云凡所見色即是見心心不自心因色顯心華嚴云知一切法即心自性成就慧身不由他悟上文云若能轉物即同如來又云色身外洎山河大地咸是妙明心中所現物若不明悟誰非狂走佛言妙覺明圓本圓明妙至妄性如是因何為在妙覺明圓本圓明妙即體用無二圓滿也以妙覺故不妨隨緣以本圓故曾何虧損夫妄依真有真不生妄以不生故何有其因若有因者何名為妄妄雖無因仍因妄起如云明妄非他覺明為咎則所因能立所妄既立生汝妄能則亦能因所起故曰展轉相因一迷為心決定惑為色身之內分自分他塵劫莫返了知迷因因迷有識識迷無因則生滅俱不可得了知不可得者豈不如寤人説夢耶妄因迷有悟知是迷迷妄俱非本覺妙心曾何遺失如演若達多頭本不失狂迷謂失慌怖狂走豈特狂歇得頭當其狂時頭亦何失若知狂謬自悔其癡矣汝但不隨分別世間至何藉劬勞肯綮修證所言狂者何謂也即分別心是若不分別則世出世間自他諸法大小名相一切不實如虗空華本無所有有何修證如此則阿難種種起問同是狂相若識是狂則三因三緣當念不生勝淨妙心豈從人得三因者空昧為世界因貪愛為衆生因殺盜為業果因皆因迷妄若了迷妄則狂惑叵得譬如有人於自衣中繫如意珠至方悟神珠非從外得上文引喻將終故勸不隨分別則知本有菩提非從外得恐未悟者定執菩提要因修得蓋他經皆云歷劫修證此中不藉修證自相矛盾良難取信故重引衣珠以為喻端即如阿難見佛三十二相渴仰剃落又云將謂如來惠我三昧無勞我修而今始知身心本不相待若不修行如不聞等與此開示勢似相反觀意會文阿難慌怖求懇妙奢摩等最初方便以至於此豈不如迷自衣珠而貧窮求乞者也世尊展轉發明豈非智者示珠者也上文歇即菩提此喻當其迷時珠未曾少迷者自謬耳即時阿難在大衆中頂禮佛足起立白佛世尊現説殺盜淫業至因緣自然理窮於是阿難前聞非因非緣非自然非和合似有契入故説偈讚佛今聞三緣斷故三因不生復疑因緣為是若依今説則上説為非若依上説則今説為非處此兩難故有此問也上文非因緣自然和合者為明藏性也以藏性非因緣自然故今云因斷緣滅即菩提者正是非因緣義以菩提不屬因緣故恐人不解故此重請復引身子等聞因緣義而得開悟者所謂引喻不齊矣何也身子等聞因緣者偈云法從因緣生法從因緣滅生滅是因緣自性非生滅既云性非生滅非因緣明矣佛云彼説自然我説因緣破彼自然非外道所知如此則因緣自然皆表顯建立曾無實旨自然既非因緣何有阿難反疑自然有異因緣故世尊復引狂性因緣以為開示狂非自然因一念不覺失心狂走故説因緣狂若歇時自然有不狂性如此則不狂之人因緣自然皆成戲論如人患病服藥得愈有病有愈若無病者非病非愈故曰因緣自然理窮於是阿難演若達多頭本自然至頭本無妄何為狂走文分三節初則總言頭本自然謂無自然無不自然以自然之名名不自立如眼之不自見心之不自知既非自然則何待因緣怖頭狂走次云頭若自然因緣故狂則頭應已失頭既不失則狂怖奚為計因緣者墮矣三云狂若自然本有狂性則應人人皆狂可稱自然若此狂怖性本具有有狂時有不狂時彼不狂者狂何所潛若獨演若狂而餘人不狂者則狂非自然性具明矣若此狂性必從因緣生者各各照鏡因緣義同何故餘皆不狂而獨演若狂耶是知因緣自然與彼本頭曾何所預上文云迷己逐物認物為己演若一喻可為盡矣若悟本頭識知狂走至此句方名無戲論法此中還指初文為結若悟頭本自然本自其然識知狂走因緣自然俱為戲論上文所謂但有言説俱為戲論也如不能言下知歸重起妄計因緣滅故有菩提生者此但生滅非得菩提也生滅俱盡無可得者名無功用道不即默契執有自然復落生滅無生滅者名為自然初云所謂本自其然無然非自故引世間和合以曉諭之和合者即因緣義本然者即自然義此皆世間所計若悟藏性無戲論者本然非然和合非合合然俱離即因緣自然二俱遠離而復非離非合妄計斯遣真心斯在故圓覺云遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻即此義也菩提涅槃尚在遙遠至秪益戲論法身有證德智身有報德涅槃有斷德菩提者即智身也能悟合然俱離離合俱非得無功用道證法身也智身則廣修六度入一切差別法門然後福智圓滿成盧舍那涅槃則斷煩惱到無煩惱可斷始名大安樂性是二者必須歷劫修證故云遙遠所謂理雖頓悟承悟并消事假漸除因次第盡若惟空持諸佛言教而不修行克證只益戲論何也如舍利弗乍聞一偈克證斷結永出生死阿難具持法藏伸詞請問展轉成疑豈不天淵哉雖則阿難大權示現正為我輩空恣談論一無所得者設也汝雖談説因緣自然至如何自欺尚留觀聽文有三節初則雖達無戲論法菩提涅槃尚在遙遠必須修證非多聞可預次釋多聞明了自然因緣決無戲論若不修證多聞無益故不能免離摩登伽難若此多聞可當菩提則何須待我神呪加持然後彼此解脫三則勸修無漏勝彼多聞日劫相遠密顯神呪功能作助道緣起正意在起修道也經分五分見道分齊於此餘不繁演問曰一席所談無非正法何以止此答曰修道分者惟選一耳根圓通為此方教體乃教門一期讚揚不可一定何也如二十五無學所證圓通實無優劣欲令阿難速易成就豈能盡攝羣機以機有利鈍因心不等此為觀音易入而彼二十四聖於十八界各稱便宜所以香巖擊竹悟道靈雲見色明心臨濟領於痛棒玄沙悟傷足指溈山撥火洞山覩水雖如來再世不能非其悟是知不可一定也助道分稱揚神呪如能即信定獲冥加證果分乃聖賢境界非凡夫可測諸天升進故不可知即如三塗果報豈豫盡解五十陰魔惟佛能究下地上惑冥然莫解故或是或非並聽古人惟此見道一分學者當盡其心故豫敢呈管見與諸方共然則聖意叵測脫有謬解之過伏惟知識乞施懺悔耳問曰一人發真歸源十方世界悉皆消殞自我本師釋迦以來其間祖師遞代出興豈不是發真歸元者何以出間還復如故當有旨不答曰汝嘗夢中所見山河大地與日間同不曰然如此假如十人同做一夢十人所見異不曰不異假若一人醒時此一人所見世界已消殞不曰已消殞既已消殞彼九人未醒者所見世界同消殞不曰不然彼九人未醒那得同消如此則汝何疑諸聖之世界不消耶一人醒時則一人之世界已消十人同醒則十人之世界消殞何有不可以一人醒時同彼九人之在夢亦不可以九人在夢而疑一人之醒故曰十方如來與大菩薩并其自住三摩地者見此山河大地如虗空華本無所有且我輩現摶四大六根如夢中人説醒時話其可得哉問曰一期所論以謂墮淫生怖見相生欣求不可得皆名妄想正等無差如此則聖道不必修淫殺不必斷今云衆生以貪愛為本業種以淫殺為本三因斷故三緣不生心中演若狂性自歇歇即菩提如此則淫殺必當斷除方成佛道若以前説為是則成撥無若以後説為是則成妄想何以辨之答曰顯理扶事各有宗趣前為阿難不明真心認彼前塵妄生取捨所以令其擇取真心徵至無有心既不有取捨奚為次由阿難起無心之怖復令擇見其間見性不還見非遠近見非大小見非舒縮見非因緣見非自然乃至見非和合方知性真不動妄心徒自去來同於幻夢若執定有不動見性猶名妄心直至見猶離見見不能及始是真見由是廣推五陰六入十二處十八界七大周圓稱性發揮離是非是於中可有修道之是而淫殺之非乎所以理須頓悟承悟并消若必欲於中取捨是非真如撮摩虗空秪益自勞但有言説俱無實義若解稱性發揮則海印發光少加意識則塵勞先起理性如是非是強言此中扶事必須斷除若不斷除則徒成狂解終無得益所以業種以淫殺為本三漸次以斷淫為正修證聖位必先欲愛乾枯六天惟論欲之輕重以辨升進梵天以欲心明悟不犯欲塵身為梵侶十因六交多論淫欲五陰魔業必曰淫淫相傳故落魔道淫既如此殺盜亦然著欲斷欲優劣如此豈有不斷而得解脫乎故曰事假漸除因次第盡經文于事理兩間致意諄諄不可不辨汝之所問實為要問也
