front:
  text: 大佛頂首楞嚴經臆說序臆說者為何謂也豫慚膚學短於見聞欲見大乘伸此管見實乃胸臆之談甚非通方之論也私謂法旨淵深小智豈能倣佛佛心叵測三乘尚乃依稀然則不妨當其所知而互呈象體隨方意語而各說身因蓋由如來藏海大小隨望而飲之者海水不為深淺智慧日輪東西各見而觀之者日影何有自他所以三乘同觀四諦而大小各證聖乘十界共秉一音而聖凡並成利益實乃得之於心豈關文字失亦在我未必由人如能因指見月見月則了知月不在指聞聲悟道悟道則便解道本非聲迷己逐物開口成非轉物皈己拈來盡是豫於讀經之際默有所知於義不足敢折片言字有誵訛少伸己意隨解隨録緝以成帙藏諸私室未敢呈人邇來東塔坐夏持論思益而諸師等偶見私本發心願刻止之不可自魄自揚倘亦中理將此用報佛恩杜撰非通智識施我懺悔時大明萬曆四十四年歲在丙辰中秋嗣曹洞正宗第三十二代古越雲門顯聖寺後學沙門湛然圓澄注并序
